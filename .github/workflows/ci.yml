name: StemScriber CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        # PYTHONPATH=. so test files that do `from backend.xxx import ...`
        # can resolve the package root.
        # DATABASE_URL=dummy triggers the auth-required path in
        # backend/auth/middleware.py (_DB_AVAILABLE flag). Tests assert
        # 401 responses from auth-gated endpoints; without a DATABASE_URL
        # the middleware silently passes through and returns 200.
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://ci:ci@localhost/ci
        run: pytest backend/tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        # --exit-zero: report issues but don't fail the build. Tech-debt cleanup
        # (F401 unused imports, F841 unused vars, W293 whitespace) is post-launch work.
        run: ruff check backend/ --select E,W,F --ignore E501,F401,F841,E741,F541,W293,W291,W292 --exit-zero
