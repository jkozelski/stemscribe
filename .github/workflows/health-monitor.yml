name: Production Health Monitor

# Runs every 5 minutes against stemscriber.com.
# Appends timestamped status to monitoring/health-YYYY-MM-DD.md and auto-commits.
# Opens a GitHub issue + sends a Twilio SMS on 3 consecutive failures.

on:
  schedule:
    # GitHub Actions cron is in UTC; */5 = every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:  # manual trigger from the Actions tab

permissions:
  contents: write   # to commit the health log
  issues: write     # to open incident issues

concurrency:
  # Don't queue multiple monitor runs — if one's still going, skip the next.
  group: health-monitor
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need full history so we can append + push to main
          fetch-depth: 0

      - name: Run health checks
        id: check
        env:
          BASE_URL: https://stemscriber.com
        run: |
          set +e  # don't bail on a single failed curl — we want all results
          mkdir -p monitoring

          ts="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          date_file="monitoring/health-$(date -u +'%Y-%m-%d').md"
          touch "$date_file"

          # If new file, give it a header
          if [ ! -s "$date_file" ]; then
            echo "# StemScriber Health Log — $(date -u +'%Y-%m-%d')" > "$date_file"
            echo "" >> "$date_file"
            echo "Auto-generated by \`.github/workflows/health-monitor.yml\` every 5 min." >> "$date_file"
            echo "" >> "$date_file"
            echo "| UTC time | /api/health | /billing/plans | /api/library | total ms |" >> "$date_file"
            echo "|---|---|---|---|---|" >> "$date_file"
          fi

          declare -a results=()
          declare -i any_fail=0
          total_start=$(python3 -c "import time; print(time.time())")

          for endpoint in "/api/health" "/billing/plans" "/api/library"; do
            t0=$(python3 -c "import time; print(time.time())")
            http_code=$(curl -s -o /tmp/resp -w "%{http_code}" -m 10 "$BASE_URL$endpoint")
            t1=$(python3 -c "import time; print(time.time())")
            ms=$(python3 -c "print(int(($t1 - $t0) * 1000))")
            ok="✓"
            if [ "$http_code" != "200" ]; then
              ok="✗ ($http_code)"
              any_fail=1
            fi
            results+=("$ok ${ms}ms")
          done

          total_end=$(python3 -c "import time; print(time.time())")
          total_ms=$(python3 -c "print(int(($total_end - $total_start) * 1000))")

          # Append a row
          row="| $ts | ${results[0]} | ${results[1]} | ${results[2]} | ${total_ms} |"
          echo "$row" >> "$date_file"
          echo "Logged: $row"

          # Set step output for downstream
          echo "any_fail=$any_fail" >> "$GITHUB_OUTPUT"
          echo "log_file=$date_file" >> "$GITHUB_OUTPUT"
          echo "row=$row" >> "$GITHUB_OUTPUT"

      - name: Commit + push the log
        # Only commit if there's an actual diff (avoid empty commits)
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "stemscriber-monitor"
          git config user.email "monitor@stemscriber.com"
          git add monitoring/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "monitor: health check $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Detect 3 consecutive failures
        id: detect_outage
        if: steps.check.outputs.any_fail == '1'
        run: |
          # Look at last 3 rows of today's log; if all have ✗ → outage
          log_file="${{ steps.check.outputs.log_file }}"
          # tail row data only (skip header lines)
          last_three=$(grep -E "^\| 20" "$log_file" | tail -3)
          fail_count=$(echo "$last_three" | grep -c "✗")
          echo "Last 3 rows fail-count: $fail_count"
          if [ "$fail_count" -ge 3 ]; then
            echo "outage=1" >> "$GITHUB_OUTPUT"
          else
            echo "outage=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open incident issue (if 3+ consecutive failures)
        if: steps.detect_outage.outputs.outage == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const ts = new Date().toISOString();
            // Don't open duplicate incidents — search for an open one first
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'incident,auto-detected',
              state: 'open',
            });
            if (existing.data.length > 0) {
              core.info(`Existing incident issue #${existing.data[0].number} still open — not duplicating`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production outage detected at ${ts}`,
              body: [
                `**Auto-detected by \`.github/workflows/health-monitor.yml\`.**`,
                ``,
                `Three consecutive 5-minute health checks failed. Latest row:`,
                ``,
                `\`\`\``,
                `${{ steps.check.outputs.row }}`,
                `\`\`\``,
                ``,
                `Investigate:`,
                `- Check stemscriber.com directly`,
                `- SSH and run \`systemctl status stemscribe\``,
                `- Check Cloudflare tunnel: \`systemctl status cloudflared\``,
                `- Recent log: \`journalctl -u stemscribe -n 100\``,
                ``,
                `Close this issue once resolved. The monitor will not open another until this one is closed.`,
              ].join('\n'),
              labels: ['incident', 'auto-detected'],
            });
            core.info('Incident issue opened.');

      - name: SMS Jeff via Twilio (if outage detected)
        if: steps.detect_outage.outputs.outage == '1'
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: "+18447915323"
          JEFF_PHONE: "+18034149454"
        run: |
          if [ -z "$TWILIO_ACCOUNT_SID" ] || [ -z "$TWILIO_AUTH_TOKEN" ]; then
            echo "Twilio secrets not configured — skipping SMS. Add TWILIO_ACCOUNT_SID and TWILIO_AUTH_TOKEN as repo secrets to enable."
            exit 0
          fi
          BODY="🚨 stemscriber.com health check failing 3x. Run: ssh root@vps 'systemctl status stemscribe'"
          curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_ACCOUNT_SID}/Messages.json" \
            --data-urlencode "From=${TWILIO_FROM}" \
            --data-urlencode "To=${JEFF_PHONE}" \
            --data-urlencode "Body=${BODY}" \
            -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            -o /tmp/twilio_resp.json
          echo "Twilio response (first 200 chars):"
          head -c 200 /tmp/twilio_resp.json
