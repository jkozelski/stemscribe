        function showError(msg) {
            viewportEl.innerHTML =
                '<div class="k-no-lyrics"><h2>Error</h2><p>' + escapeHtml(msg) + '</p>' +
                '<a href="/app" class="k-retry-btn" style="text-decoration:none;margin-top:1rem;">Back to App</a></div>';
        }

        // ── Enough stems to start playback ──
        function onStemsPlayable() {
            var loading = document.getElementById('kLoading');
            if (loading) {
                var lt = document.getElementById('kLoadingText');
                if (lt) lt.textContent = 'Ready! Loading remaining stems...';
                loading.style.opacity = '0.4';
                setTimeout(function() { if (loading.parentNode) loading.remove(); }, 2000);
            }
        }

        // ── All stems loaded ──
        function onAllStemsReady() {
            var loading = document.getElementById('kLoading');
            if (loading) loading.remove();
        }

        // ── Playback controls ──
        var hasPlayedOnce = false;

        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                if (!hasPlayedOnce) {
                    hasPlayedOnce = true;
                    // iOS Safari: we MUST call play() on audio elements in this user gesture handler,
                    // even if we want to delay actual playback for the countdown animation.
                    // Play then immediately pause to "unlock" the audio elements for iOS.
                    audioElements.forEach(function(entry) {
                        var p = entry.audio.play();
                        if (p && p.then) {
                            p.then(function() {
                                entry.audio.pause();
                                entry.audio.currentTime = 0;
                            }).catch(function(e) {
                                console.log('[Karaoke] iOS unlock play rejected for ' + entry.name + ':', e.message);
                            });
                        }
                    });
                    // Hide the play overlay
                    var playOverlay = document.getElementById('kPlayOverlay');
                    if (playOverlay) playOverlay.classList.add('hidden');
                    document.getElementById('karaokeApp').classList.remove('pre-play');
                    showStaticCountdown(function() {
                        play();
                    });
                } else {
                    play();
                }
            }
        }

        // Fallback button state sync — keeps play/pause icon correct
        // even when the rAF sync loop isn't running (plain lyrics, no-lyrics mode)
        setInterval(function() {
            if (!playBtn) return;
            var shouldBePlaying = audioElements.some(function(s) { return !s.audio.paused; });
            var playIcon = '\u25B6';
            var pauseIcon = '\u23F8';
            var icon = shouldBePlaying ? pauseIcon : playIcon;
            if (playBtn.textContent !== icon) {
                playBtn.innerHTML = shouldBePlaying ? '&#9208;' : '&#9654;';
                isPlaying = shouldBePlaying;
            }
        }, 500);

        function showStaticCountdown(callback) {
            var overlay = document.getElementById('kStaticOverlay');
            var countdownEl = document.getElementById('kCountdown');
            overlay.classList.remove('hidden', 'fade-out');
            countdownEl.textContent = '';

            // Hide blue gradient behind static overlay
            karaokeApp.classList.add('static-bg');

            // Static for 1.5s, then countdown
            setTimeout(function() {
                var count = 3;
                countdownEl.textContent = count;
                countdownEl.classList.remove('pop');
                void countdownEl.offsetWidth; // force reflow
                countdownEl.classList.add('pop');

                var countInterval = setInterval(function() {
                    count--;
                    if (count > 0) {
                        countdownEl.textContent = count;
                        countdownEl.classList.remove('pop');
                        void countdownEl.offsetWidth;
                        countdownEl.classList.add('pop');
                    } else {
                        clearInterval(countInterval);
                        // Fade out static — restore blue gradient first
                        karaokeApp.classList.remove('static-bg');
                        overlay.classList.add('fade-out');
                        setTimeout(function() {
                            overlay.classList.add('hidden');
                            callback();
                        }, 500);
                    }
                }, 800);
            }, 1500);
        }

        var syncInterval = null;
        var SYNC_THRESHOLD = 0.05; // 50ms drift tolerance

        function play() {
            // Set all to the same time
            var refTime = audioElements.length > 0 ? audioElements[0].audio.currentTime : 0;
            audioElements.forEach(function(entry) {
                entry.audio.currentTime = refTime;
            });

            // Play ALL stems synchronously — no setTimeout.
            // iOS Safari requires play() in the same user gesture call stack.
            audioElements.forEach(function(entry) {
                entry.audio.play().catch(function() {});
            });
            isPlaying = true;
            playBtn.innerHTML = '&#9208;';
            if (scrollContainer) {
                scrollContainer.classList.add('lyrics-visible');
            }
            startDriftCorrection();
            startSyncLoop();
        }

        function startDriftCorrection() {
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(function() {
                if (!isPlaying || audioElements.length < 2) return;
                var refTime = audioElements[0].audio.currentTime;
                for (var i = 1; i < audioElements.length; i++) {
                    var drift = audioElements[i].audio.currentTime - refTime;
                    if (Math.abs(drift) > SYNC_THRESHOLD) {
                        audioElements[i].audio.currentTime = refTime;
                    }
                }
            }, 500);
        }

        function pause() {
            audioElements.forEach(function(entry) {
                entry.audio.pause();
            });
            isPlaying = false;
            playBtn.innerHTML = '&#9654;';
            if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
        }

        function seekTo(time) {
            var wasPlaying = isPlaying;
            if (wasPlaying) {
                audioElements.forEach(function(entry) { entry.audio.pause(); });
            }
            audioElements.forEach(function(entry) {
                entry.audio.currentTime = time;
            });
            lastActiveIndex = -1;
            if (wasPlaying) {
                // Resume playback synchronously — no setTimeout for iOS compatibility
                audioElements.forEach(function(entry) {
                    entry.audio.play().catch(function() {});
                });
                startDriftCorrection();
                startSyncLoop();
            }
        }

        playBtn.addEventListener('click', togglePlay);

        // Timeline seeking
        timelineWrap.addEventListener('click', function(e) {
            if (!duration) return;
            var rect = timelineWrap.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            seekTo(pct * duration);
        });

        // Timeline drag
        var isDragging = false;
        timelineWrap.addEventListener('mousedown', function(e) {
            isDragging = true;
            handleTimelineDrag(e);
        });
        document.addEventListener('mousemove', function(e) {
            if (isDragging) handleTimelineDrag(e);
        });
        document.addEventListener('mouseup', function() { isDragging = false; });

        function handleTimelineDrag(e) {
            if (!duration) return;
            var rect = timelineWrap.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            seekTo(pct * duration);
        }

        // Touch support for timeline
        timelineWrap.addEventListener('touchstart', function(e) {
            handleTimelineTouch(e);
        }, { passive: true });
        timelineWrap.addEventListener('touchmove', function(e) {
            handleTimelineTouch(e);
        }, { passive: true });

        function handleTimelineTouch(e) {
            if (!duration || !e.touches.length) return;
            var rect = timelineWrap.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
            seekTo(pct * duration);
        }

        // Volume
        volumeSlider.addEventListener('input', function() {
            masterVolume = this.value / 100;
            nonVocalAudios.forEach(function(a) { a.volume = masterVolume; });
            if (vocalsEnabled) {
                vocalAudios.forEach(function(a) { a.volume = masterVolume; });
            }
            updateVolumeIcon();
        });

        volumeIcon.addEventListener('click', function() {
            if (masterVolume > 0) {
                volumeSlider.value = 0;
                masterVolume = 0;
            } else {
                volumeSlider.value = 80;
                masterVolume = 0.8;
            }
            nonVocalAudios.forEach(function(a) { a.volume = masterVolume; });
            if (vocalsEnabled) {
                vocalAudios.forEach(function(a) { a.volume = masterVolume; });
            }
            updateVolumeIcon();
        });

        function updateVolumeIcon() {
            if (masterVolume === 0) volumeIcon.innerHTML = '&#128263;';
            else if (masterVolume < 0.5) volumeIcon.innerHTML = '&#128265;';
            else volumeIcon.innerHTML = '&#128266;';
        }

        // Vocal toggle
        vocalToggle.addEventListener('click', function() {
            vocalsEnabled = !vocalsEnabled;
            vocalAudios.forEach(function(a) {
                a.volume = vocalsEnabled ? masterVolume : 0;
            });
            vocalToggle.textContent = vocalsEnabled ? 'Vocals On' : 'Vocals Off';
            vocalToggle.classList.toggle('vocals-on', vocalsEnabled);
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', function() {
            var el = document.getElementById('karaokeApp');
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            } else {
                (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            }
        });

        document.addEventListener('fullscreenchange', updateFullscreenBtn);
        document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);

        function updateFullscreenBtn() {
            var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            fullscreenBtn.textContent = isFs ? 'Exit FS' : 'Fullscreen';
        }

        // ── THE END screen ──
        function showEndScreen() {
            var endEl = document.getElementById('kEndOverlay');
            if (!endEl) return;
            // Hide solo if showing
            if (soloEl) { soloEl.classList.add('hidden'); soloEl.style.opacity = '0'; }
            soloShowing = false;
            // Show end overlay with fade-in
            endEl.classList.remove('hidden');
            void endEl.offsetWidth; // force reflow
            endEl.classList.add('visible');
        }

        document.getElementById('kEndRestartBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            var endEl = document.getElementById('kEndOverlay');
            if (endEl) { endEl.classList.remove('visible'); endEl.classList.add('hidden'); }
            restartSong();
        });

        // ── Restart function ──
        function restartSong() {
            // Stop playback and seek to start
            if (isPlaying) pause();
            seekTo(0);
            lastActiveIndex = -1;

            // Hide overlays
            var restartEl = document.getElementById('kCrtRestart');
            if (restartEl) restartEl.classList.add('hidden');
            var endEl = document.getElementById('kEndOverlay');
            if (endEl) { endEl.classList.remove('visible'); endEl.classList.add('hidden'); }
            if (soloEl) { soloEl.classList.add('hidden'); soloEl.style.opacity = '0'; }
            soloShowing = false;

            // Show countdown then play
            showStaticCountdown(function() {
                play();
            });
        }

        // ── CRT pause/play flash ──
        function showCrtPauseFlash(forceHide) {
            var restartEl = document.getElementById('kCrtRestart');
            if (!restartEl) return;
            if (forceHide) {
                restartEl.classList.add('hidden');
            } else {
                // Just paused — show pause screen with resume + restart
                restartEl.classList.remove('hidden');
            }
        }

        // ── Click on screen to play/pause ──
        // Play overlay click
        document.getElementById('kPlayOverlay').addEventListener('click', function() {
            togglePlay();
        });
        // CRT restart buttons
        document.getElementById('kCrtResume').addEventListener('click', function(e) {
            e.stopPropagation();
            togglePlay();
            showCrtPauseFlash(true);
        });
        document.getElementById('kCrtRestartBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            showCrtPauseFlash(true);
            restartSong();
        });
        // CRT mode: click anywhere on screen to play/pause
        document.getElementById('karaokeApp').addEventListener('click', function(e) {
            if (e.target.closest('.k-play-overlay')) return;
            if (e.target.closest('.k-crt-restart')) return;
            if (e.target.closest('.k-btn')) return;
            if (!crtActive) return;
            var wasPaused = !isPlaying;
            togglePlay();
            showCrtPauseFlash(wasPaused);
        });

        // ── Keyboard shortcuts ──
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;

            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    seekTo(Math.max(0, getCurrentTime() - 5));
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    seekTo(Math.min(duration, getCurrentTime() + 5));
                    break;
                case 'KeyF':
                    fullscreenBtn.click();
                    break;
                case 'KeyV':
                    vocalToggle.click();
                    break;
                case 'KeyT':
                    cycleTheme();
                    break;
                case 'KeyR':
                    restartSong();
                    break;
                case 'Escape':
                    if (document.fullscreenElement || document.webkitFullscreenElement) {
                        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                    } else {
                        if (history.length > 1) { history.back(); } else { window.location.href = 'index.html'; }
                    }
                    break;
            }
        });

        function getCurrentTime() {
            if (audioElements.length === 0) return 0;
            return audioElements[0].audio.currentTime || 0;
        }

        // ── Sync loop ──
        // Delay lyrics highlight so it matches when the singer actually sings
        var LYRICS_OFFSET = 0.0; // zero offset — line activates exactly at its timestamp

        function startSyncLoop() {
            if (animId) cancelAnimationFrame(animId);

            // Cache computed style values outside frame loop for performance
            var cachedAccentColor = getComputedStyle(document.body).getPropertyValue('--theme-accent').trim();
            var cachedAccentRgb = getComputedStyle(document.body).getPropertyValue('--theme-accent-rgb').trim();

            function frame() {
                var realTime = getCurrentTime();
                var ct = realTime - LYRICS_OFFSET; // offset for lyrics sync

                // Update transport with real time
                if (duration > 0) {
                    progressEl.style.width = ((realTime / duration) * 100) + '%';
                }
                currentTimeEl.textContent = formatTime(realTime);

                // Update play button state
                playBtn.innerHTML = isPlaying ? '&#9208;' : '&#9654;';

                // Find active line
                if (syncedLines) {
                    var activeIndex = -1;
                    for (var i = syncedLines.length - 1; i >= 0; i--) {
                        if (ct >= syncedLines[i].time) {
                            activeIndex = i;
                            break;
                        }
                    }

                    // Pre-verse: show and scroll to first lines 8 seconds before first verse
                    // Ensure lyrics are visible once playing
                    if (isPlaying && scrollContainer && !scrollContainer.classList.contains('lyrics-visible')) {
                        scrollContainer.classList.add('lyrics-visible');
                    }

                    if (activeIndex < 0 && syncedLines.length > 0) {
                        var firstRealLine = syncedLines[0].time;
                        if (realTime >= firstRealLine - 10) {
                            for (var pi = 0; pi < Math.min(5, lineElements.length); pi++) {
                                lineElements[pi].className = 'k-line approaching-1';
                            }
                            scrollToLine(0);
                        }
                    }

                    if (activeIndex !== lastActiveIndex) {
                        // Reset wave on previous active line
                        if (lastActiveIndex >= 0 && lineElements[lastActiveIndex]) {
                            var oldChars = lineElements[lastActiveIndex].querySelectorAll('.k-char');
                            for (var oci = 0; oci < oldChars.length; oci++) {
                                oldChars[oci].style.color = '';
                                oldChars[oci].style.transform = '';
                                oldChars[oci].style.textShadow = '';
                            }
                        }
                        lastActiveIndex = activeIndex;
                        updateLineClasses(activeIndex);
                        scrollToLine(activeIndex);

                        // Reset ball tracking on line change
                        lastBallCharIndex = -1;
                    }

                    // Scroll ahead: position next line in view 2s before it's sung
                    if (activeIndex >= 0 && activeIndex < syncedLines.length - 1) {
                        var nextLine = syncedLines[activeIndex + 1];
                        var timeToNext = nextLine.time - realTime;
                        if (timeToNext <= 2.0 && timeToNext > 0) {
                            scrollToLine(activeIndex + 1);
                            // Show next line as approaching
                            if (lineElements[activeIndex + 1]) {
                                lineElements[activeIndex + 1].className = 'k-line approaching-1';
                            }
                        }
                    }

                    // Solo/instrumental break detection
                    if (soloEl && syncedLines) {
                        // Find next line with actual text after current time
                        var nextTextIdx = -1;
                        for (var si = 0; si < syncedLines.length; si++) {
                            if (syncedLines[si].time > realTime && syncedLines[si].text && syncedLines[si].text.trim()) {
                                nextTextIdx = si; break;
                            }
                        }
                        // Find previous line with actual text before current time
                        var prevTextIdx = -1;
                        if (nextTextIdx > 0) {
                            for (var pi = nextTextIdx - 1; pi >= 0; pi--) {
                                if (syncedLines[pi].text && syncedLines[pi].text.trim()) {
                                    prevTextIdx = pi; break;
                                }
                            }
                        }
                        var inSolo = false;
                        if (prevTextIdx >= 0 && nextTextIdx > 0) {
                            var prevTime = syncedLines[prevTextIdx].time;
                            var nextTime = syncedLines[nextTextIdx].time;
                            inSolo = (nextTime - prevTime) >= 8 && (realTime - prevTime) > 2 && (nextTime - realTime) > 3;
                        }

                        if (inSolo && !soloShowing) {
                            soloShowing = true;
                            soloEl.classList.remove('hidden');
                            soloEl.style.opacity = '0';
                            void soloEl.offsetWidth;
                            soloEl.style.transition = 'opacity 1.5s ease';
                            soloEl.style.opacity = '1';
                            var soloTexts = ['SOLO', 'JAM', 'GROOVE', 'FEEL IT', 'RIDE IT'];
                            document.getElementById('kSoloText').textContent =
                                soloTexts[Math.floor(Math.random() * soloTexts.length)];
                        } else if (!inSolo && soloShowing) {
                            soloShowing = false;
                            lastActiveIndex = -1; // Force re-sync so scroll/classes update
                            soloEl.style.transition = 'opacity 0.8s ease';
                            soloEl.style.opacity = '0';
                            setTimeout(function() { soloEl.classList.add('hidden'); }, 800);
                        }
                    }

                    // Wave effect — uses real word timestamps when available
                    if (activeIndex >= 0 && lineElements[activeIndex]) {
                        var lineData = syncedLines[activeIndex];
                        var chars = lineElements[activeIndex].querySelectorAll('.k-char');
                        var charCount = chars.length;
                        var accentColor = cachedAccentColor;
                        var accentRgb = cachedAccentRgb;

                        if (charCount > 0) {
                            var waveFrontChar = -1;
                            // Build per-character timestamps from word data
                            var charTimes = null;
                            if (lineData.words && lineData.words.length > 0) {
                                // Real word timestamps — map to characters
                                charTimes = [];
                                for (var wi = 0; wi < lineData.words.length; wi++) {
                                    var wd = lineData.words[wi];
                                    var wStart = wd.start || lineData.time;
                                    var wLen = wd.word.length;
                                    var cp = wd.char_pos || 0;
                                    // Each char in this word gets a slightly staggered time
                                    for (var wci = 0; wci < wLen; wci++) {
                                        var charIdx = cp + wci;
                                        if (charIdx < charCount) {
                                            charTimes[charIdx] = wStart + (wci * 0.04); // 40ms per char within word
                                        }
                                    }
                                    // Space after word
                                    if (cp + wLen < charCount) {
                                        charTimes[cp + wLen] = wStart + (wLen * 0.04);
                                    }
                                }
                                // Fill any gaps
                                for (var fi = 0; fi < charCount; fi++) {
                                    if (charTimes[fi] === undefined) charTimes[fi] = lineData.time;
                                }
                            }

                            for (var ci = 0; ci < charCount; ci++) {
                                var charSungAt;
                                if (charTimes) {
                                    charSungAt = charTimes[ci];
                                } else {
                                    // Fallback: estimate from line duration
                                    var lineEnd = (activeIndex < syncedLines.length - 1)
                                        ? syncedLines[activeIndex + 1].time : lineData.time + 4;
                                    var wordCnt = (lineData.text || '').split(/\s+/).length;
                                    var singTime = Math.min(lineEnd - lineData.time, Math.max(1.2, wordCnt * 0.35));
                                    charSungAt = lineData.time + (ci / charCount) * singTime;
                                }

                                var dist = (realTime + 0.1) - charSungAt;
                                if (dist >= 0.08) {
                                    // Fully sung
                                    chars[ci].style.color = accentColor;
                                    chars[ci].style.transform = 'scale(1.15)';
                                    chars[ci].style.textShadow = '0 0 8px rgba(' + accentRgb + ', 0.7)';
                                } else if (dist >= -0.05) {
                                    // Wave peak — char is being sung right now
                                    var wave = (dist + 0.05) / 0.2; // 0 to 1
                                    var scale = 1 + 0.4 * Math.sin(wave * Math.PI);
                                    chars[ci].style.color = accentColor;
                                    chars[ci].style.transform = 'scale(' + scale.toFixed(3) + ')';
                                    chars[ci].style.textShadow = '0 0 14px rgba(' + accentRgb + ', 1)';
                                    // Track wave front for bouncing ball
                                    waveFrontChar = ci;
                                } else {
                                    // Not yet sung
                                    chars[ci].style.color = '';
                                    chars[ci].style.transform = '';
                                    chars[ci].style.textShadow = '';
                                }
                            }

                            // Position bouncing ball on wave front character
                            if (waveFrontChar >= 0 && chars[waveFrontChar]) {
                                positionBallOnChar(chars[waveFrontChar]);

                                // Spawn sparkle on new word boundaries
                                if (waveFrontChar !== lastBallCharIndex && waveFrontChar > 0) {
                                    var prevText = chars[waveFrontChar - 1] ? chars[waveFrontChar - 1].textContent : '';
                                    if (prevText === ' ' || lastBallCharIndex === -1) {
                                        var bRect = chars[waveFrontChar].getBoundingClientRect();
                                        spawnSparkle(bRect.left + bRect.width / 2, bRect.top);
                                        // Occasional floating note
                                        if (Math.random() < 0.3) {
                                            spawnNote(bRect.left + bRect.width / 2, bRect.top - 10);
                                        }
                                    }
                                }
                                lastBallCharIndex = waveFrontChar;
                            } else if (bouncingBall) {
                                bouncingBall.classList.remove('visible');
                            }
                        }
                    }


                    // Instrumental break detection
                    if (waitingEl) {
                        if (activeIndex >= 0 && activeIndex < syncedLines.length - 1) {
                            var gap = syncedLines[activeIndex + 1].time - syncedLines[activeIndex].time;
                            var elapsed = ct - syncedLines[activeIndex].time;
                            var lineText = syncedLines[activeIndex].text.trim();
                            // Show indicator if >8s gap and we're past the current line text
                            if (gap > 8 && elapsed > 2 && !lineText) {
                                waitingEl.classList.add('visible');
                            } else {
                                waitingEl.classList.remove('visible');
                            }
                        } else {
                            waitingEl.classList.remove('visible');
                        }
                    }
                }

                animId = requestAnimationFrame(frame);
            }

            animId = requestAnimationFrame(frame);
        }

        function updateLineClasses(activeIndex) {
            var activeTime = (activeIndex >= 0 && activeIndex < syncedLines.length)
                ? syncedLines[activeIndex].time : 0;

            for (var i = 0; i < lineElements.length; i++) {
                var el = lineElements[i];
                el.className = 'k-line';

                if (i === activeIndex) {
                    el.classList.add('active');
                } else if (i < activeIndex) {
                    var behind = activeIndex - i;
                    if (behind >= 1 && behind <= 5) {
                        el.classList.add('past-' + behind);
                    } else {
                        el.classList.add('past');
                    }
                } else {
                    // Time-based approaching: show lines within next 8 seconds
                    var lineTime = syncedLines[i] ? syncedLines[i].time : 0;
                    var timeAhead = lineTime - activeTime;

                    if (timeAhead <= 8.0) {
                        // Map time distance to approaching level (1=closest, 7=furthest)
                        var level = Math.max(1, Math.min(7, Math.ceil(timeAhead / 1.15)));
                        el.classList.add('approaching-' + level);
                    }
                    // Lines beyond 8s stay invisible
                }
            }
        }

        // Show approaching lines before any line is active (intro/pre-verse)
        function updateApproachingFromTime(ct) {
            for (var i = 0; i < lineElements.length; i++) {
                var el = lineElements[i];
                var lineTime = syncedLines[i] ? syncedLines[i].time : 0;
                var timeAhead = lineTime - ct;
                el.className = 'k-line';
                if (timeAhead >= 0 && timeAhead <= 8.0) {
                    var level = Math.max(1, Math.min(7, Math.ceil(timeAhead / 1.15)));
                    el.classList.add('approaching-' + level);
                }
            }
        }

        function scrollToLine(index) {
            if (index < 0 || !lineElements[index] || !scrollContainer) return;

            var line = lineElements[index];
            var viewportHeight = viewportEl.clientHeight;
            var lineTop = line.offsetTop;
            var lineHeight = line.offsetHeight;
            var scrollTarget = lineTop - (viewportHeight * 0.45) + (lineHeight / 2);

            // Use transform for smooth GPU-accelerated scroll
            var maxScroll = scrollContainer.scrollHeight - viewportHeight;
            scrollTarget = Math.max(0, Math.min(scrollTarget, maxScroll));

            scrollContainer.style.transform = 'translateY(' + (-scrollTarget) + 'px)';
        }

        // ── Ambient particles ──
        function recreateParticles(colors) {
            var container = document.getElementById('kParticles');
            container.innerHTML = '';
            createParticlesWithColors(container, colors);
        }

        function createParticlesWithColors(container, colors) {
            var theme = THEMES[currentThemeIndex];
            var count = theme.particleCount || 20;
            var maxOpacity = theme.id === 'dive-bar' ? 0.3 : 0.6;

            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'k-particle';

                // Cosmic gets twinkling on some particles
                if (theme.twinkle && Math.random() > 0.5) {
                    p.classList.add('twinkle');
                }

                var size;
                if (theme.id === 'cosmic') {
                    size = 1 + Math.random() * 2.5;
                } else if (theme.id === 'dive-bar') {
                    size = 1.5 + Math.random() * 3;
                } else {
                    size = 2 + Math.random() * 4;
                }

                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (15 + Math.random() * 25) + 's';
                p.style.animationDelay = (Math.random() * 20) + 's';

                if (theme.twinkle && p.classList.contains('twinkle')) {
                    // Randomize twinkle speed
                    p.style.animationDuration = (15 + Math.random() * 25) + 's, ' + (1.5 + Math.random() * 3) + 's';
                    p.style.animationDelay = (Math.random() * 20) + 's, ' + (Math.random() * 2) + 's';
                }

                container.appendChild(p);
            }
        }

        function createParticles() {
            var container = document.getElementById('kParticles');
            var colors = THEMES[currentThemeIndex].particles;
            createParticlesWithColors(container, colors);
        }

        createParticles();

    })();
    </script>
