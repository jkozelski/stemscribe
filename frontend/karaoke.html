                0 0 40px rgba(255, 0, 255, 0.5),
                0 0 80px rgba(255, 0, 255, 0.3),
                0 0 120px rgba(0, 255, 255, 0.2);
            letter-spacing: 8px;
            animation: k-solo-pulse 2s ease-in-out infinite;
        }
        @keyframes k-solo-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* ── THE END overlay ── */
        .k-end-overlay {
            position: absolute;
            inset: -5px;
            z-index: 190;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            background: rgba(0, 0, 0, 0);
            transition: background 2s ease;
        }
        .k-end-overlay.visible {
            background: rgba(0, 0, 0, 0.85);
        }
        .k-end-overlay.hidden { display: none; }
        .k-end-text {
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 5rem;
            color: var(--theme-accent, #ffd700);
            text-shadow:
                0 0 20px var(--theme-glow, rgba(255, 215, 0, 0.7)),
                0 0 60px var(--theme-glow-mid, rgba(255, 215, 0, 0.4));
            letter-spacing: 8px;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 2s ease, transform 2s ease;
        }
        .k-end-overlay.visible .k-end-text {
            opacity: 1;
            transform: scale(1);
        }
        .k-end-overlay .k-crt-restart-btn {
            opacity: 0;
            transition: opacity 1s ease 2s;
        }
        .k-end-overlay.visible .k-crt-restart-btn {
            opacity: 1;
        }

        /* ── No lyrics / retry form ── */
        .k-no-lyrics {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
        }

        .k-no-lyrics h2 {
            font-family: 'Righteous', cursive;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .k-no-lyrics p {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.9rem;
            max-width: 400px;
        }

        .k-retry-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .k-retry-form input {
            padding: 0.55rem 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            width: 180px;
        }

        .k-retry-form input:focus {
            border-color: rgba(var(--theme-accent-rgb), 0.4);
        }

        .k-retry-form input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .k-retry-btn {
            padding: 0.55rem 1.2rem;
            background: rgba(var(--theme-accent-rgb), 0.1);
            border: 1px solid rgba(var(--theme-accent-rgb), 0.3);
            color: var(--theme-accent);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .k-retry-btn:hover {
            background: rgba(var(--theme-accent-rgb), 0.2);
            box-shadow: 0 0 15px rgba(var(--theme-accent-rgb), 0.2);
        }

        /* ── Plain lyrics (no sync) ── */
        .k-plain-lyrics {
            padding: 2rem;
            overflow-y: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .k-plain-lyrics .k-plain-line {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.55);
            line-height: 2;
            text-align: center;
            max-width: 700px;
        }

        /* ── Vocal toggle ── */
        .k-vocal-toggle {
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            border: 1px solid rgba(255, 107, 157, 0.3);
            background: rgba(255, 107, 157, 0.08);
            color: var(--pink);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .k-vocal-toggle:hover {
            background: rgba(255, 107, 157, 0.15);
        }

        .k-vocal-toggle.vocals-on {
            border-color: rgba(var(--theme-accent-rgb), 0.3);
            background: rgba(var(--theme-accent-rgb), 0.08);
            color: var(--theme-accent);
        }

        /* ── Ambient particles ── */
        .k-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .k-particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: k-float linear infinite;
        }

        @keyframes k-float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.1; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* Cosmic twinkle particles (applied via JS) */
        .k-particle.twinkle {
            animation: k-float linear infinite, cosmic-twinkle 2s ease-in-out infinite;
        }

        /* ── Fullscreen adjustments ── */
        :fullscreen .k-line { font-size: 2rem; }
        :fullscreen .k-line.active { font-size: 3rem; }
        :fullscreen .k-header { padding: 0.8rem 2rem; }
        :fullscreen .k-transport { padding: 0.8rem 2rem; }

        :-webkit-full-screen .k-line { font-size: 2rem; }
        :-webkit-full-screen .k-line.active { font-size: 3rem; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .k-line { font-size: 1.2rem; padding: 0.5rem 0.6rem; }
            .k-line.active { font-size: 1.5rem; }
            .k-line.approaching-1 { font-size: 1.4rem; }
            .k-line.approaching-2 { font-size: 1.3rem; }
            .k-line.approaching-3,
            .k-line.approaching-4,
            .k-line.approaching-5,
            .k-line.approaching-6,
            .k-line.approaching-7 { font-size: 1.2rem; }
            .k-lyrics-scroll { gap: 0.8rem; padding: 65vh 1rem 25vh 1rem; }
            .k-header { padding: 0.4rem 0.8rem; }
            .k-transport { padding: 0.5rem 0.8rem; gap: 0.5rem; }
            .k-volume-wrap { display: none; }
            .k-btn { padding: 0.3rem 0.5rem; font-size: 0.7rem; }
            .k-btn--theme { font-size: 0.75rem; padding: 0.25rem 0.45rem; }
            .k-play-btn { width: 36px; height: 36px; font-size: 1rem; }
            .k-song-title { font-size: 0.8rem; }

            /* Hide decorative elements on mobile */
            .vinyl-record { display: none !important; }
            .divebar-beer-sign { display: none !important; }
            .cosmic-nebula-blob { width: 250px; height: 200px; }
        }

        @media (max-width: 480px) {
            .k-line { font-size: 1.05rem; padding: 0.4rem 0.5rem; line-height: 1.5; }
            .k-line.active { font-size: 1.3rem; }
            .k-line.approaching-1 { font-size: 1.2rem; }
            .k-line.approaching-2 { font-size: 1.1rem; }
            .k-line.approaching-3,
            .k-line.approaching-4,
            .k-line.approaching-5,
            .k-line.approaching-6,
            .k-line.approaching-7 { font-size: 1.05rem; }
            .k-lyrics-scroll { gap: 1rem; padding: 60vh 0.8rem 20vh 0.8rem; }
            .k-header { padding: 0.3rem 0.6rem; gap: 0.3rem; }
            .k-song-title { font-size: 0.7rem; max-width: 40%; }
            .k-transport { padding: 0.4rem 0.6rem; }
            .k-play-btn { width: 32px; height: 32px; font-size: 0.9rem; }
        }

        /* ── Landscape mobile ── */
        @media (max-height: 500px) {
            .k-header { padding: 0.3rem 1rem; }
            .k-transport { padding: 0.3rem 1rem; }
            .k-line { font-size: 1.4rem; gap: 0.3rem; }
            .k-line.active { font-size: 1.7rem; }
            .k-lyrics-scroll { padding: 70vh 1rem 20vh 1rem; gap: 0.3rem; }
            .divebar-beer-sign { display: none !important; }
        }

        /* ── Waiting / instrumental break ── */
        .k-waiting-indicator {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 0.5rem;
            z-index: 50;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
        }

        .k-waiting-indicator.visible {
            display: flex;
        }

        .k-waiting-dots span {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--theme-accent);
            border-radius: 50%;
            animation: k-pulse 1.4s ease-in-out infinite;
            opacity: 0.4;
        }
        .k-waiting-dots span:nth-child(2) { animation-delay: 0.15s; }
        .k-waiting-dots span:nth-child(3) { animation-delay: 0.3s; }

        /* ══════════════════════════════════════════
           THEME PICKER SCREEN
           ══════════════════════════════════════════ */
        .k-picker {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(ellipse at 50% 30%, #1a1a2e 0%, #0d0d1a 60%, #000 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.4s ease;
        }
        .k-picker.hidden { opacity: 0; pointer-events: none; }
        .k-picker-title {
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 2.4rem; color: #fff;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 136, 0, 0.6), 0 0 40px rgba(255, 136, 0, 0.3);
        }
        .k-picker-subtitle {
            color: rgba(255,255,255,0.4); font-size: 0.85rem;
            margin-bottom: 2rem; letter-spacing: 2px;
        }
        .k-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.4rem;
            width: min(95vw, 1300px);
        }
        .k-picker-card {
            position: relative; cursor: pointer;
            border-radius: 14px; overflow: visible;
            aspect-ratio: 4 / 3;
            border: 2px solid rgba(255,255,255,0.12);
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, box-shadow 0.2s, z-index 0s;
            background: #111;
            z-index: 1;
            isolation: isolate;
        }
        .k-picker-card > * { border-radius: 12px; overflow: hidden; }
        .k-picker-card:hover, .k-picker-card:focus-visible {
            transform: scale(1.13);
            border-color: rgba(255, 136, 0, 0.75);
            box-shadow: 0 0 0 1px rgba(255,136,0,0.3), 0 0 30px rgba(255, 136, 0, 0.45), 0 8px 32px rgba(0,0,0,0.7);
            z-index: 10;
        }
        .k-picker-card-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            border-radius: 12px; overflow: hidden;
        }
        .k-picker-card-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 8px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff; font-size: 0.8rem; font-weight: 600;
            letter-spacing: 1px; text-align: center;
        }
        .k-picker-back {
            position: fixed; top: 14px; left: 14px; z-index: 10000;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6); font-size: 0.85rem;
            padding: 6px 14px; border-radius: 6px; cursor: pointer;
        }
        .k-picker-back:hover { background: rgba(255,255,255,0.15); color: #fff; }
        @media (max-width: 700px) {
            .k-picker-grid { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
            .k-picker-title { font-size: 1.6rem; }
            .k-picker-card:hover { transform: scale(1.06); }
        }
    </style>
</head>
<body>
    <!-- Theme Picker Screen -->
    <div class="k-picker" id="kPicker">
        <button class="k-picker-back" onclick="if(history.length>1){history.back()}else{window.location.href='index.html'}">&#9664; Back</button>
        <div class="k-picker-title">Pick Your Mode</div>
        <div class="k-picker-subtitle">Choose a vibe for your session</div>
        <div class="k-picker-grid" id="kPickerGrid"></div>
    </div>

    <!-- Floating back button for CRT themes (header is hidden) -->
    <button class="k-crt-back" onclick="if(history.length>1){history.back()}else{window.location.href='index.html'}" title="Back to mixer">&#9664; Back</button>
    <select class="k-crt-theme-select" id="kCrtThemeSelect" title="Switch theme"></select>

    <!-- CRT frame wrapper for photo-based themes — image-relative positioning -->
    <div class="k-crt-frame" id="kCrtFrame">
        <img class="k-crt-frame-img" id="kCrtFrameImg" src="images/crt-divebar-v2.png" alt="">
    </div>
    <div class="karaoke-app pre-play" id="karaokeApp">
        <!-- Synthwave background elements -->
        <div class="synthwave-bg">
            <div class="synthwave-sun"></div>
            <div class="synthwave-grid"></div>
        </div>

        <!-- Cosmic nebula blob -->
        <div class="cosmic-nebula">
            <div class="cosmic-nebula-blob"></div>
        </div>

        <!-- Vinyl record (decorative) -->
        <div class="vinyl-record"></div>

        <!-- Dive Bar BEER neon sign -->
        <div class="divebar-beer-sign">KARAOKE</div>

        <!-- Ambient particles -->
        <div class="k-particles" id="kParticles"></div>

        <!-- Bouncing ball (Dive Bar theme) -->
        <div class="k-bouncing-ball" id="kBouncingBall">
            <div class="k-bouncing-ball-dot"></div>
        </div>

        <!-- Theme toast -->
        <div class="k-theme-toast" id="kThemeToast"></div>

        <!-- Header -->
        <div class="k-header" id="kHeader">
            <div class="k-header-left">
                <img src="/images/logomark.png" alt="StemScriber" class="k-logo">
                <div class="k-song-info">
                    <div class="k-song-title" id="kTitle">Loading...</div>
                    <div class="k-song-artist" id="kArtist"></div>
                </div>
            </div>
            <div class="k-header-right">
                <span class="k-key-badge" id="kKeyBadge"></span>
                <button class="k-vocal-toggle" id="kVocalToggle" title="Toggle vocals">Vocals Off</button>
                <button class="k-btn k-btn--theme" id="kThemeBtn" title="Cycle theme (T)">&#127912;</button>
                <button class="k-btn k-btn--fullscreen" id="kFullscreenBtn" title="Fullscreen">Fullscreen</button>
                <button class="k-btn k-btn--back" onclick="if(history.length>1){history.back()}else{window.location.href='index.html'}" title="Back">&#9664; Back</button>
            </div>
        </div>

        <!-- Pre-play overlay with big play button (direct child of app for full coverage) -->
        <div class="k-play-overlay" id="kPlayOverlay">
            <div class="k-play-overlay-btn">&#9654;</div>
            <div class="k-play-overlay-title" id="kPlayOverlayTitle">Press to play</div>
            <div class="k-play-overlay-song" id="kPlayOverlaySong"></div>
        </div>
        <!-- CRT pause/restart overlay -->
        <div class="k-crt-restart hidden" id="kCrtRestart">
            <div class="k-crt-restart-text">PAUSED</div>
            <div class="k-crt-restart-btns">
                <button class="k-crt-restart-btn" id="kCrtResume">&#9654; RESUME</button>
                <button class="k-crt-restart-btn" id="kCrtRestartBtn">&#8634; START OVER</button>
            </div>
        </div>
        <!-- CRT Static + Countdown overlay (direct child of app for full coverage) -->
        <div class="k-static-overlay hidden" id="kStaticOverlay">
            <div class="k-static-noise"></div>
            <div class="k-static-scanlines"></div>
            <div class="k-static-bar"></div>
            <div class="k-countdown" id="kCountdown"></div>
        </div>
        <!-- Lounge smoke ambient -->
        <div class="k-lounge-smoke k-lounge-smoke-1"></div>
        <div class="k-lounge-smoke k-lounge-smoke-2"></div>

        <!-- Concert Stage: sweeping spotlights + fog -->
        <div class="concert-spotlights">
            <div class="concert-spot concert-spot-1"></div>
            <div class="concert-spot concert-spot-2"></div>
            <div class="concert-spot concert-spot-3"></div>
            <div class="concert-spot concert-spot-4"></div>
            <div class="concert-spot concert-spot-5"></div>
            <div class="concert-fog"></div>
        </div>

        <!-- Neon Alley: rain, reflections, neon sign glows -->
        <div class="neon-rain-bg">
            <div class="neon-rain-layer"></div>
            <div class="neon-rain-layer-2"></div>
            <div class="neon-ground-reflect"></div>
            <div class="neon-sign-left"></div>
            <div class="neon-sign-right"></div>
        </div>

        <!-- Campfire: pulsing glow, smoke wisps -->
        <div class="campfire-bg">
            <div class="campfire-glow"></div>
            <div class="campfire-core"></div>
            <div class="campfire-smoke"></div>
        </div>

        <!-- Grand Theater: chandeliers, curtains, dust motes -->
        <div class="theater-bg">
            <div class="theater-curtain-left"></div>
            <div class="theater-curtain-right"></div>
            <div class="theater-chandelier"></div>
            <div class="theater-spotlight"></div>
            <div class="theater-dust"></div>
        </div>

        <!-- Lyrics area -->
        <div class="k-lyrics-viewport" id="kViewport">
            <div class="k-loading" id="kLoading">
                <div class="k-loading-dots"><span></span><span></span><span></span></div>
                <div class="k-loading-text" id="kLoadingText">Loading stems 0/0...</div>
            </div>
        </div>

        <!-- THE END overlay -->
        <div class="k-end-overlay hidden" id="kEndOverlay">
            <div class="k-end-text">THE END</div>
            <button class="k-crt-restart-btn" id="kEndRestartBtn">&#8634; PLAY AGAIN</button>
        </div>

        <!-- Solo / Instrumental break overlay -->
        <div class="k-solo-overlay hidden" id="kSoloOverlay">
            <div class="k-solo-fractal"></div>
            <div class="k-solo-fractal k-solo-fractal-2"></div>
            <div class="k-solo-fractal k-solo-fractal-3"></div>
            <div class="k-solo-text" id="kSoloText">SOLO</div>
        </div>

        <!-- Transport -->
        <div class="k-transport" id="kTransport">
            <button class="k-play-btn" id="kPlayBtn" title="Play/Pause">&#9654;</button>
            <span class="k-time" id="kCurrentTime">0:00</span>
            <div class="k-timeline-wrap" id="kTimelineWrap">
                <div class="k-timeline">
                    <div class="k-timeline-progress" id="kProgress"></div>
                </div>
            </div>
            <span class="k-time" id="kTotalTime">0:00</span>
            <div class="k-volume-wrap">
                <span class="k-volume-icon" id="kVolumeIcon">&#128266;</span>
                <input type="range" class="k-volume-slider" id="kVolumeSlider" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ══════════════════════════════════════════
        // THEME SYSTEM
        // ══════════════════════════════════════════
        // ── CRT Frame System ──
        var karaokeApp = document.getElementById('karaokeApp');
        var crtFrameImg = document.getElementById('kCrtFrameImg');
        var crtActive = false;
        var crtConfig = null;

        // Screen coordinates as % of image (detected from pixels)
        var CRT_SCREENS = {
            'dive-bar': { img: 'images/crt-divebar-v2.png', left: 24.8, top: 11.8, right: 75.6, bottom: 85.4 },
            'tokyo': { img: 'images/crt-tokyo-bg.png', left: 24.8, top: 14.5, right: 74.5, bottom: 83.3 },
            'birthday': { img: 'images/crt-birthday-bg.png', left: 34.5, top: 30.5, right: 67.5, bottom: 70.5 },
            'lounge': { img: 'images/crt-lounge-bg.png', left: 24.7, top: 14.6, right: 75.3, bottom: 74.0 }
        };

        function positionCrtApp() {
            if (!crtActive || !crtConfig) return;
            var img = crtFrameImg;
            if (!img.complete || img.naturalWidth === 0) return;

            var vw = window.innerWidth, vh = window.innerHeight;
            var imgAR = img.naturalWidth / img.naturalHeight;
            var vpAR = vw / vh;
            var renderW, renderH, renderX, renderY;

            if (vpAR > imgAR) {
                renderH = vh;
                renderW = vh * imgAR;
                renderX = (vw - renderW) / 2;
                renderY = 0;
            } else {
                renderW = vw;
                renderH = vw / imgAR;
                renderX = 0;
                renderY = (vh - renderH) / 2;
            }

            var screenL = renderX + (crtConfig.left / 100) * renderW;
            var screenT = renderY + (crtConfig.top / 100) * renderH;
            var screenR = renderX + (crtConfig.right / 100) * renderW;
            var screenB = renderY + (crtConfig.bottom / 100) * renderH;

            karaokeApp.style.left = screenL + 'px';
            karaokeApp.style.top = screenT + 'px';
            karaokeApp.style.width = (screenR - screenL) + 'px';
            karaokeApp.style.height = (screenB - screenT) + 'px';
            karaokeApp.classList.add('crt-positioned');
        }

        function setupCrtFrame(theme) {
            if (CRT_SCREENS[theme.id]) {
                crtConfig = CRT_SCREENS[theme.id];
                crtFrameImg.src = crtConfig.img;
                crtActive = true;
                positionCrtApp();
            } else {
                crtActive = false;
                crtConfig = null;
                karaokeApp.classList.remove('crt-positioned');
                karaokeApp.style.left = '';
                karaokeApp.style.top = '';
                karaokeApp.style.width = '';
                karaokeApp.style.height = '';
            }
        }

        // Reposition on resize via ResizeObserver
        new ResizeObserver(function() { positionCrtApp(); }).observe(document.documentElement);
        // Also reposition once image loads
        crtFrameImg.addEventListener('load', function() { positionCrtApp(); });

        var THEMES = [
            { id: 'vinyl-classic', name: 'Vinyl Classic', particles: ['#ffd700', '#ff8c00', '#ffaa33', '#e6b800'], particleCount: 18 },
            { id: 'cosmic', name: 'Cosmic', particles: ['#ffffff', '#00e5ff', '#7c4dff', '#b388ff', '#e0e0ff'], particleCount: 35, twinkle: true },
            { id: 'stage-light', name: 'Stage Light', particles: ['#ffaa33', '#ff8800', '#ffcc55', '#dd8822'], particleCount: 18 },
            { id: 'synthwave', name: 'Synthwave', particles: ['#ff2d95', '#ff6b00', '#ff00ff', '#ff4488'], particleCount: 20 },
            { id: 'dive-bar', name: 'Dive Bar', particles: ['#ffff44', '#44ff44', '#ffdd00', '#88ff88'], particleCount: 12 },
            { id: 'tokyo', name: 'Tokyo Karaoke', particles: ['#ff69b4', '#00e5ff', '#ff00ff', '#00ffcc'], particleCount: 0 },
            { id: 'lounge', name: 'Smoker\'s Lounge', particles: ['#daa520', '#b8860b', '#cd853f', '#8b7355'], particleCount: 0 },
            { id: 'birthday', name: 'Birthday Party', particles: ['#ff6b9d', '#ffaa44', '#ff69b4', '#ffcc00'], particleCount: 0 },
            { id: 'concert-stage', name: 'Concert Stage', particles: ['#cc44ff', '#00ccff', '#ffffff', '#ff44aa', '#ffcc00'], particleCount: 28, twinkle: true },
            { id: 'neon-alley', name: 'Neon Alley', particles: ['#00eeff', '#ff1a6e', '#0088ff', '#ff00cc', '#00ffcc'], particleCount: 22 },
            { id: 'campfire', name: 'Campfire', particles: ['#ff8800', '#ff6600', '#ffcc00', '#ff4400', '#ff9933'], particleCount: 32 },
            { id: 'grand-theater', name: 'Grand Theater', particles: ['#ffd98a', '#ffe8b0', '#ffcc66', '#fff0c0', '#e8d0b0'], particleCount: 16, twinkle: true }
        ];

        var currentThemeIndex = 0;
        var themeToastTimeout = null;
        var themeBtn = document.getElementById('kThemeBtn');
        var themeToast = document.getElementById('kThemeToast');

        // Load theme: URL param takes priority, then localStorage
        var urlTheme = new URLSearchParams(window.location.search).get('theme');
        var themeSource = urlTheme || null;
        if (!themeSource) {
            try { themeSource = localStorage.getItem('stemscribe-karaoke-theme'); } catch (e) {}
        }
        if (themeSource) {
            for (var ti = 0; ti < THEMES.length; ti++) {
                if (THEMES[ti].id === themeSource) {
                    currentThemeIndex = ti;
                    break;
                }
            }
        }

        function applyTheme(index, showToast) {
            currentThemeIndex = index;
            var theme = THEMES[index];
            document.body.setAttribute('data-theme', theme.id);
            try {
                localStorage.setItem('stemscribe-karaoke-theme', theme.id);
            } catch (e) {}

            // CRT frame setup
            setupCrtFrame(theme);

            // Recreate particles with theme colors
            recreateParticles(theme.particles);

            // Update bouncing ball visibility
            updateBouncingBall();

            // Re-start sync loop to pick up new theme accent colors
            if (syncedLines && lineElements.length > 0) {
                startSyncLoop();
            }

            if (showToast) {
                themeToast.textContent = theme.name;
                themeToast.classList.add('visible');
                if (themeToastTimeout) clearTimeout(themeToastTimeout);
                themeToastTimeout = setTimeout(function() {
                    themeToast.classList.remove('visible');
                }, 1500);
            }
        }

        function cycleTheme() {
            var next = (currentThemeIndex + 1) % THEMES.length;
            applyTheme(next, true);
        }

        themeBtn.addEventListener('click', cycleTheme);

        // CRT floating theme dropdown
        var crtThemeSelect = document.getElementById('kCrtThemeSelect');
        THEMES.forEach(function(t, i) {
            var opt = document.createElement('option');
            opt.value = i;
            opt.textContent = t.name;
            crtThemeSelect.appendChild(opt);
        });
        crtThemeSelect.addEventListener('change', function() {
            applyTheme(parseInt(this.value), true);
        });

        // Keep dropdown in sync when theme changes via other means (T key, button)
        var origApplyTheme = applyTheme;
        applyTheme = function(index, showToast) {
            origApplyTheme(index, showToast);
            crtThemeSelect.value = index;
        };

        // ══════════════════════════════════════════
        // THEME PICKER
        // ══════════════════════════════════════════
        var pickerEl = document.getElementById('kPicker');
        var pickerGrid = document.getElementById('kPickerGrid');
        var urlThemeParam = new URLSearchParams(window.location.search).get('theme');

        // Preview backgrounds for each theme
        // CRT themes: use compressed thumbnails (16–32 KB instead of 2–5 MB)
        var pickerPreviews = {
            'vinyl-classic': 'linear-gradient(160deg, #3d1500 0%, #6b2800 35%, #ffd700 60%, #7a3000 80%, #2a0a00 100%)',
            'cosmic': 'linear-gradient(160deg, #000d1a 0%, #0a1e4a 30%, #00e5ff 55%, #7c4dff 75%, #060e1a 100%)',
            'stage-light': 'linear-gradient(160deg, #1a0800 0%, #5c2800 30%, #ffaa33 55%, #ff6600 70%, #1a0800 100%)',
            'synthwave': 'linear-gradient(160deg, #0a0020 0%, #3d0066 30%, #ff2d95 55%, #ff6b00 75%, #150020 100%)',
            'dive-bar': 'url(images/thumb-divebar.jpg)',
            'tokyo': 'url(images/thumb-tokyo.jpg)',
            'lounge': 'url(images/thumb-lounge.jpg)',
            'birthday': 'url(images/thumb-birthday.jpg)',
            'concert-stage': 'linear-gradient(160deg, #050005 0%, #1a0030 25%, #6600cc 45%, #cc44ff 60%, #00ccff 80%, #04000a 100%)',
            'neon-alley': 'linear-gradient(160deg, #020810 0%, #003050 25%, #001a40 45%, #00eeff 62%, #ff1a6e 80%, #010408 100%)',
            'campfire': 'linear-gradient(160deg, #020408 0%, #0d0804 30%, #3d1a00 55%, #ff8800 72%, #ffcc00 85%, #0d0804 100%)',
            'grand-theater': 'linear-gradient(160deg, #0d0404 0%, #4a1010 25%, #8b1a1a 45%, #cc3333 60%, #ffd98a 78%, #1a0808 100%)'
        };

        THEMES.forEach(function(t, i) {
            var card = document.createElement('div');
            card.className = 'k-picker-card';
            card.dataset.index = i;
            var bg = document.createElement('div');
            bg.className = 'k-picker-card-bg';
            var preview = pickerPreviews[t.id] || '#222';
            if (preview.indexOf('url(') === 0) {
                bg.style.backgroundImage = preview;
            } else {
                bg.style.background = preview;
            }
            var label = document.createElement('div');
            label.className = 'k-picker-card-label';
            label.textContent = t.name;
            card.appendChild(bg);
            card.appendChild(label);
            card.addEventListener('click', function() {
                applyTheme(i, false);
                pickerEl.classList.add('hidden');
                setTimeout(function() { pickerEl.style.display = 'none'; }, 400);
            });
            pickerGrid.appendChild(card);
        });

        // If theme specified in URL, skip picker. Otherwise always show it.
        if (urlThemeParam) {
            applyTheme(currentThemeIndex, false);
            pickerEl.style.display = 'none';
        } else {
            // Show picker — highlight last used theme if any
            applyTheme(currentThemeIndex, false);
        }

        // ══════════════════════════════════════════
        // BOUNCING BALL (Dive Bar)
        // ══════════════════════════════════════════
        var bouncingBall = document.getElementById('kBouncingBall');

        var lastBallCharIndex = -1;
        var lastSparkleTime = 0;
        var noteSymbols = ['\u266A', '\u266B', '\u2669', '\u266C'];

        function updateBouncingBall() {
            // Ball works on all themes now
        }

        function positionBouncingBall(lineEl) {
            // Now handled by positionBallOnChar
        }

        function positionBallOnChar(charEl) {
            if (!bouncingBall || !charEl) {
                if (bouncingBall) bouncingBall.classList.remove('visible');
                return;
            }
            var rect = charEl.getBoundingClientRect();
            bouncingBall.style.left = (rect.left + rect.width / 2 - 7) + 'px';
            bouncingBall.style.top = (rect.top - 24) + 'px';
            bouncingBall.classList.add('visible');
        }

        function spawnSparkle(x, y) {
            var now = performance.now();
            if (now - lastSparkleTime < 300) return; // throttle
            lastSparkleTime = now;

            var container = document.createElement('div');
            container.className = 'k-sparkle';
            container.style.left = x + 'px';
            container.style.top = y + 'px';

            for (var s = 0; s < 6; s++) {
                var p = document.createElement('div');
                p.className = 'k-sparkle-particle';
                var angle = (s / 6) * Math.PI * 2 + Math.random() * 0.5;
                var dist = 15 + Math.random() * 20;
                p.style.setProperty('--sx', (Math.cos(angle) * dist) + 'px');
                p.style.setProperty('--sy', (Math.sin(angle) * dist) + 'px');
                container.appendChild(p);
            }

            document.body.appendChild(container);
            setTimeout(function() { container.remove(); }, 700);
        }

        function spawnNote(x, y) {
            var note = document.createElement('div');
            note.className = 'k-note-float';
            note.textContent = noteSymbols[Math.floor(Math.random() * noteSymbols.length)];
            note.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
            note.style.top = y + 'px';
            note.style.color = getComputedStyle(document.body).getPropertyValue('--theme-accent').trim();
            document.body.appendChild(note);
            setTimeout(function() { note.remove(); }, 2600);
        }

        // ── Config ──
        var API_BASE = '';
        var jobId = new URLSearchParams(window.location.search).get('job');
        if (!jobId) {
            document.getElementById('kLoading').innerHTML =
                '<div class="k-no-lyrics"><h2>No Job ID</h2><p>Open karaoke mode from a processed song in StemScriber.</p>' +
                '<a href="/app" class="k-retry-btn" style="text-decoration:none;margin-top:1rem;">Go to App</a></div>';
            return;
        }

        // ── State ──
        var audioElements = [];    // [{name, audio}]
        var vocalAudios = [];      // refs to vocal audio elements
        var nonVocalAudios = [];   // refs to non-vocal audio elements
        var syncedLines = null;    // [{time, text}]
        var duration = 0;
        var isPlaying = false;
        var vocalsEnabled = false;
        var masterVolume = 0.8;
        var animId = null;
        var lastActiveIndex = -1;
        var lineElements = [];
        var scrollContainer = null;
        var soloShowing = false;
        var soloEl = null;
        var viewportEl = null;
        var readyCount = 0;
        var totalStems = 0;
        var stemsPlayable = false;

        // ── DOM refs ──
        var titleEl = document.getElementById('kTitle');
        var artistEl = document.getElementById('kArtist');
        var keyBadge = document.getElementById('kKeyBadge');
        var playBtn = document.getElementById('kPlayBtn');
        var currentTimeEl = document.getElementById('kCurrentTime');
        var totalTimeEl = document.getElementById('kTotalTime');
        var progressEl = document.getElementById('kProgress');
        var timelineWrap = document.getElementById('kTimelineWrap');
        var volumeSlider = document.getElementById('kVolumeSlider');
        var volumeIcon = document.getElementById('kVolumeIcon');
        var fullscreenBtn = document.getElementById('kFullscreenBtn');
        var vocalToggle = document.getElementById('kVocalToggle');
        var loadingEl = document.getElementById('kLoading');
        var viewportEl = document.getElementById('kViewport');
        var waitingEl = document.getElementById('kWaiting');
        soloEl = document.getElementById('kSoloOverlay');

        // ── Utility ──
        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function escapeHtml(str) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        function isVocalStem(name) {
            var lower = name.toLowerCase();
            return lower.indexOf('vocal') >= 0;
        }

        // ── Step 1: Fetch job data ──
        fetch(API_BASE + '/api/status/' + jobId)
            .then(function(r) { return r.json(); })
            .then(function(job) {
                if (job.error && !job.stems) {
                    showError('Job not found or not yet processed.');
                    return;
                }

                // Song info
                var rawTitle = (job.metadata && job.metadata.title) || job.filename || 'Unknown Track';
                var displayTitle = rawTitle;
                var displayArtist = '';
                var dashIdx = rawTitle.indexOf(' - ');
                if (dashIdx > 0) {
                    displayArtist = rawTitle.substring(0, dashIdx).trim();
                    displayTitle = rawTitle.substring(dashIdx + 3).trim();
                }
                titleEl.textContent = displayTitle;
                artistEl.textContent = displayArtist;
                document.title = 'Karaoke: ' + displayTitle + (displayArtist ? ' - ' + displayArtist : '');

                // Populate play overlay
                var playOverlaySong = document.getElementById('kPlayOverlaySong');
                if (playOverlaySong) {
                    playOverlaySong.textContent = displayTitle + (displayArtist ? ' — ' + displayArtist : '');
                }

                // Key badge
                if (job.detected_key) {
                    keyBadge.textContent = job.detected_key;
                    keyBadge.style.display = 'inline-block';
                }

                // Create audio elements for all stems
                if (job.stems && Object.keys(job.stems).length > 0) {
                    var stemNames = Object.keys(job.stems);
                    totalStems = stemNames.length;
                    var lt = document.getElementById('kLoadingText');
                    if (lt) lt.textContent = 'Loading stems 0/' + totalStems + '...';

                    stemNames.forEach(function(name) {
                        var url = (job.enhanced_stems && job.enhanced_stems[name])
                            ? API_BASE + '/api/download/' + jobId + '/enhanced/' + name
                            : API_BASE + '/api/download/' + jobId + '/stem/' + name;

                        var audio = new Audio(url);
                        audio.preload = 'auto';
                        audio.crossOrigin = 'anonymous';

                        var entry = { name: name, audio: audio };
                        audioElements.push(entry);

                        if (isVocalStem(name)) {
                            vocalAudios.push(audio);
                            audio.volume = 0; // mute vocals by default
                        } else {
                            nonVocalAudios.push(audio);
                            audio.volume = masterVolume;
                        }

                        audio.addEventListener('canplaythrough', function() {
                            readyCount++;
                            var lt = document.getElementById('kLoadingText');
                            if (lt) lt.textContent = 'Loading stems ' + readyCount + '/' + totalStems + '...';
                            if (readyCount >= 2 && !stemsPlayable) {
                                stemsPlayable = true;
                                onStemsPlayable();
                            }
                            if (readyCount >= totalStems) {
                                onAllStemsReady();
                            }
                        }, { once: true });

                        audio.addEventListener('loadedmetadata', function() {
                            if (audio.duration && audio.duration > duration) {
                                duration = audio.duration;
                                totalTimeEl.textContent = formatTime(duration);
                            }
                        });

                        // Handle ended — show THE END screen only when ALL stems are done
                        audio.addEventListener('ended', function() {
                            var allEnded = audioElements.every(function(st) {
                                return st.audio.ended || st.audio.currentTime >= st.audio.duration - 0.1;
                            });
                            if (allEnded) {
                                isPlaying = false;
                                playBtn.innerHTML = '&#9654;';
                                showEndScreen();
                            }
                        });
                    });
                } else {
                    showError('No stems found. Process a song first.');
                    return;
                }

                // Fetch lyrics
                fetchLyrics(jobId);
            })
            .catch(function(err) {
                console.error('Failed to load job:', err);
                showError('Failed to load job data.');
            });

        // ── Step 2: Fetch lyrics ──
        function fetchLyrics(jid, artist, title) {
            var url = API_BASE + '/api/lyrics/' + jid;
            var params = [];
            if (artist) params.push('artist=' + encodeURIComponent(artist));
            if (title) params.push('title=' + encodeURIComponent(title));
            if (params.length) url += '?' + params.join('&');

            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.found && data.synced_lyrics && data.synced_lyrics.length > 0) {
                        syncedLines = data.synced_lyrics;
                        buildSyncedLyrics(data);
                    } else if (data.found && data.plain_lyrics) {
                        buildPlainLyrics(data);
                    } else {
                        showNoLyrics();
                    }
                })
                .catch(function() {
                    showNoLyrics();
                });
        }

        // ── Build synced lyrics UI ──
        function buildSyncedLyrics(data) {
            // Update metadata if lyrics service found better info
            if (data.metadata) {
                if (data.metadata.title && titleEl.textContent === 'Loading...') {
                    titleEl.textContent = data.metadata.title;
                }
                if (data.metadata.artist && !artistEl.textContent) {
                    artistEl.textContent = data.metadata.artist;
                }
            }

            viewportEl.innerHTML = '';

            scrollContainer = document.createElement('div');
            scrollContainer.className = 'k-lyrics-scroll';
            scrollContainer.id = 'kScroll';

            lineElements = [];

            syncedLines.forEach(function(line, i) {
                var div = document.createElement('div');
                div.className = 'k-line';
                div.setAttribute('data-index', i);

                // Split text into individual character spans for wave effect
                var text = line.text || '\u00A0';
                for (var ci = 0; ci < text.length; ci++) {
                    var span = document.createElement('span');
                    span.className = 'k-char';
                    span.textContent = text[ci];
                    div.appendChild(span);
                }

                // Click to seek
                div.addEventListener('click', function() {
                    seekTo(line.time);
                });

                scrollContainer.appendChild(div);
                lineElements.push(div);
            });

            viewportEl.appendChild(scrollContainer);
            startSyncLoop();
        }

        // ── Build plain lyrics (no sync) ──
        function buildPlainLyrics(data) {
            var lines = (data.plain_lyrics || '').split('\n');
            viewportEl.innerHTML = '';

            var container = document.createElement('div');
            container.className = 'k-plain-lyrics';

            if (data.metadata) {
                if (data.metadata.title) titleEl.textContent = data.metadata.title;
                if (data.metadata.artist) artistEl.textContent = data.metadata.artist;
            }

            lines.forEach(function(l) {
                var div = document.createElement('div');
                div.className = 'k-plain-line';
                div.textContent = l || '\u00A0';
                container.appendChild(div);
            });

            viewportEl.appendChild(container);
        }

        // ── No lyrics found ──
        function showNoLyrics() {
            viewportEl.innerHTML =
                '<div class="k-no-lyrics">' +
                    '<h2>No synced lyrics found</h2>' +
                    '<p>Try searching with the correct artist and song title.</p>' +
                    '<div class="k-retry-form">' +
                        '<input type="text" id="kRetryArtist" placeholder="Artist">' +
                        '<input type="text" id="kRetryTitle" placeholder="Song title">' +
                        '<button class="k-retry-btn" id="kRetryBtn">Search</button>' +
                    '</div>' +
                '</div>';

            document.getElementById('kRetryBtn').addEventListener('click', function() {
                var a = document.getElementById('kRetryArtist').value.trim();
                var t = document.getElementById('kRetryTitle').value.trim();
                if (!t) return;
                viewportEl.innerHTML = '<div class="k-loading"><div class="k-loading-dots"><span></span><span></span><span></span></div><div class="k-loading-text">Searching...</div></div>';
                fetchLyrics(jobId, a, t);
            });

            // Allow Enter key to submit
            setTimeout(function() {
                var inputs = viewportEl.querySelectorAll('input');
