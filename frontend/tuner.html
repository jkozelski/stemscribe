    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0d0d12;
            --bg-dark: #13131a;
            --bg-card: #1a1a24;
            --bg-card2: #22222e;
            --orange: #ff7b54;
            --pink: #ff6b9d;
            --lavender: #c084fc;
            --green: #00ff88;
            --red: #ff4757;
            --yellow: #ffd700;
            --blue: #61afef;
            --text: #e8e4df;
            --text-dim: #7a7a85;
            --border: #2a2a35;
            --led-off: #2a2a35;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .waveform-icon { display: inline-flex; align-items: flex-end; gap: 2px; height: 18px; flex-shrink: 0; }
        .waveform-icon .bar { width: 3px; border-radius: 2px 2px 0 0; background: linear-gradient(to top, var(--orange), var(--pink)); animation: waveform-pulse 0.8s ease-in-out infinite alternate; transform-origin: bottom center; }
        .waveform-icon .bar:nth-child(1) { height: 45%; animation-delay: 0s; }
        .waveform-icon .bar:nth-child(2) { height: 85%; animation-delay: 0.15s; }
        .waveform-icon .bar:nth-child(3) { height: 100%; animation-delay: 0.05s; }
        .waveform-icon .bar:nth-child(4) { height: 70%; animation-delay: 0.2s; }
        .waveform-icon .bar:nth-child(5) { height: 40%; animation-delay: 0.1s; }
        @keyframes waveform-pulse { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }
        .logo-text {
            font-family: 'Righteous', cursive;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--orange), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-title {
            font-family: 'Righteous', cursive;
            font-size: 1rem;
            color: var(--lavender);
            letter-spacing: 0.05em;
        }
        .nav-links { display: flex; gap: 0.75rem; align-items: center; }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--bg-card2); }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            gap: 1.5rem;
        }

        /* ── Tuner Housing ── */
        .tuner-housing {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ── Note Display ── */
        .note-section {
            text-align: center;
        }
        .note-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.15rem;
        }
        .note-name {
            font-family: 'Righteous', cursive;
            font-size: 4.5rem;
            line-height: 1;
            color: var(--text-dim);
            min-width: 2ch;
            text-align: center;
            transition: color 0.15s;
        }
        .note-name.active { color: var(--text); }
        .note-name.in-tune { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .note-octave {
            font-size: 1.8rem;
            color: var(--text-dim);
            font-family: 'Righteous', cursive;
            transition: color 0.15s;
        }
        .note-freq {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            margin-top: 0.25rem;
        }

        /* ── LED Strip ── */
        .led-section {
            padding: 0.5rem 0;
        }
        .led-strip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 1rem 0.5rem;
            background: var(--bg-deep);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .led {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--led-off);
            transition: background 0.08s, box-shadow 0.08s, opacity 0.08s;
            flex-shrink: 0;
        }
        .led.center {
            width: 18px;
            height: 18px;
        }
        /* Flat side labels */
        .led-labels {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0.5rem 0;
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
        }

        /* ── Cents Display ── */
        .cents-section {
            text-align: center;
        }
        .cents-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            transition: color 0.15s;
        }
        .cents-badge.in-tune { color: var(--green); }
        .cents-badge.flat { color: var(--blue); }
        .cents-badge.sharp { color: var(--orange); }

        /* ── Chromatic Strip ── */
        .chromatic-strip {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .chromatic-note {
            font-family: 'Righteous', cursive;
            font-size: 0.8rem;
            color: #444;
            padding: 0.25rem 0.35rem;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .chromatic-note.active {
            color: var(--text);
            background: var(--bg-card2);
        }
        .chromatic-note.in-tune {
            color: var(--green);
            background: rgba(0,255,136,0.1);
        }

        /* ── Guitar String Buttons ── */
        .string-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.4rem;
        }
        .string-btn {
            background: var(--bg-card2);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-family: 'Righteous', cursive;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            cursor: default;
            text-align: center;
            transition: all 0.15s;
        }
        .string-btn.highlight {
            background: rgba(0,255,136,0.15);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 10px rgba(0,255,136,0.2);
        }
        .string-btn.close {
            background: rgba(255,123,84,0.12);
            border-color: var(--orange);
            color: var(--orange);
        }

        /* ── Controls Row ── */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        .ref-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-dim);
        }
        .ref-input {
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            padding: 0.3rem 0.5rem;
            width: 60px;
            text-align: center;
        }
        .ref-input:focus { outline: none; border-color: var(--orange); }

        .start-btn {
            background: linear-gradient(135deg, #1a6a3a, #2a8a4a);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.6rem 2rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.04em;
        }
        .start-btn:hover { filter: brightness(1.15); }
        .start-btn:active { transform: translateY(1px); }
        .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .start-btn.stop { background: linear-gradient(135deg, #7a2a1a, #9a3a2a); }

        /* Status */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            flex-shrink: 0;
        }
        .status-dot.active { background: var(--green); box-shadow: 0 0 6px rgba(0,255,136,0.5); }
        .status-dot.error { background: var(--red); }

        /* Error */
        .error-msg {
            display: none;
            background: rgba(255, 71, 87, 0.12);
            border: 1px solid rgba(255, 71, 87, 0.4);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            color: #ff8a95;
            text-align: center;
            max-width: 520px;
            width: 100%;
        }
        .error-msg.visible { display: block; }

        /* Responsive */
        @media (max-width: 480px) {
            .tuner-housing { border-radius: 10px; padding: 1.25rem 1rem; gap: 1rem; }
            .note-name { font-size: 3.5rem; }
            .led { width: 11px; height: 11px; }
            .led.center { width: 14px; height: 14px; }
            .led-strip { gap: 3px; padding: 0.75rem 0.25rem; }
            .chromatic-note { font-size: 0.7rem; padding: 0.2rem 0.25rem; }
            .string-btn { font-size: 0.8rem; padding: 0.4rem 0; }
            .start-btn { padding: 0.5rem 1.5rem; font-size: 0.82rem; }
        }

<script>
'use strict';

// ── Constants ──
const LED_COUNT = 21;
const CENTER_LED = 10; // 0-indexed, middle of 21

// ── Build LED strip ──
const ledStripEl = document.getElementById('ledStrip');
const leds = [];
for (let i = 0; i < LED_COUNT; i++) {
    const dot = document.createElement('div');
    dot.className = 'led' + (i === CENTER_LED ? ' center' : '');
    ledStripEl.appendChild(dot);
    leds.push(dot);
}

// ── State ──
let audioContext = null;
let analyser = null;
let mediaStream = null;
let animFrameId = null;
let isRunning = false;

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const GUITAR_NOTES = [
    { name: 'E2', midi: 40 },
    { name: 'A2', midi: 45 },
    { name: 'D3', midi: 50 },
    { name: 'G3', midi: 55 },
    { name: 'B3', midi: 59 },
    { name: 'E4', midi: 64 },
];

// ── DOM refs ──
const noteNameEl    = document.getElementById('noteName');
const noteOctaveEl  = document.getElementById('noteOctave');
const noteFreqEl    = document.getElementById('noteFreq');
const centsBadgeEl  = document.getElementById('centsBadge');
const statusDotEl   = document.getElementById('statusDot');
const statusTextEl  = document.getElementById('statusText');
const startBtn      = document.getElementById('startBtn');
const errorMsgEl    = document.getElementById('errorMsg');
const refPitchEl    = document.getElementById('refPitch');
const stringBtns    = document.querySelectorAll('.string-btn');
const chromaticNotes = document.querySelectorAll('.chromatic-note');

// ── Helpers ──
function getA4() {
    return parseFloat(refPitchEl.value) || 440;
}

function freqToNoteInfo(freq) {
    const A4 = getA4();
    const A4_MIDI = 69;
    const semitones = 12 * Math.log2(freq / A4);
    const midi = Math.round(semitones) + A4_MIDI;
    const octave = Math.floor(midi / 12) - 1;
    const noteIndex = ((midi % 12) + 12) % 12;
    const cents = Math.round((semitones - Math.round(semitones)) * 100);
    const targetFreq = A4 * Math.pow(2, (midi - A4_MIDI) / 12);
    return { name: NOTE_NAMES[noteIndex], octave, cents, midi, targetFreq };
}

// ── Pitch detection: autocorrelation ──
function detectPitch(buf, sampleRate) {
    const SIZE = buf.length;
    const MAX_SAMPLES = Math.floor(SIZE / 2);

    let rms = 0;
    for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.005) return -1;

    const corr = new Float32Array(MAX_SAMPLES);
    for (let lag = 0; lag < MAX_SAMPLES; lag++) {
        let s = 0;
        for (let i = 0; i < MAX_SAMPLES; i++) {
            s += buf[i] * buf[i + lag];
        }
        corr[lag] = s;
    }

    let d = 0;
    while (d < MAX_SAMPLES && corr[d] > corr[d + 1]) d++;

    let maxVal = -1, maxPos = -1;
    for (let i = d; i < MAX_SAMPLES; i++) {
        if (corr[i] > maxVal) { maxVal = corr[i]; maxPos = i; }
    }
    if (maxPos === -1 || maxVal < 0.01) return -1;

    let x1 = maxPos - 1, x2 = maxPos, x3 = maxPos + 1;
    if (x1 < 0) x1 = 0;
    if (x3 >= MAX_SAMPLES) x3 = MAX_SAMPLES - 1;
    const a = (corr[x1] - 2 * corr[x2] + corr[x3]) / 2;
    const b = (corr[x3] - corr[x1]) / 2;
    const refinedPos = a !== 0 ? x2 - b / (2 * a) : x2;

    const freq = sampleRate / refinedPos;
    if (freq < 27 || freq > 5000) return -1;
    return freq;
}

// ── Smoothing ──
let smoothedFreq = -1;
const FREQ_SMOOTH = 0.4;

function smoothFreq(raw) {
    if (raw < 0) return smoothedFreq;
    if (smoothedFreq < 0) { smoothedFreq = raw; return raw; }
    smoothedFreq = smoothedFreq * (1 - FREQ_SMOOTH) + raw * FREQ_SMOOTH;
    return smoothedFreq;
}

// ── LED rendering ──
function updateLEDs(cents) {
    // cents: -50 to +50, or null for silent
    if (cents === null) {
        // All LEDs off
        for (let i = 0; i < LED_COUNT; i++) {
            leds[i].style.background = 'var(--led-off)';
            leds[i].style.boxShadow = 'none';
        }
        return;
    }

    const absCents = Math.abs(cents);
    const inTune = absCents <= 5;

    // Map cents to LED position: -50 = led 0, 0 = led 10, +50 = led 20
    const pos = CENTER_LED + (cents / 50) * CENTER_LED;
    const clamped = Math.max(0, Math.min(LED_COUNT - 1, pos));

    for (let i = 0; i < LED_COUNT; i++) {
        const dist = Math.abs(i - clamped);

        if (dist < 1.5) {
            // This LED is lit
            const brightness = Math.max(0, 1 - dist / 1.5);

            if (inTune && i === CENTER_LED) {
                // Center LED in tune — bright green
                leds[i].style.background = 'var(--green)';
                leds[i].style.boxShadow = '0 0 12px rgba(0,255,136,0.8), 0 0 24px rgba(0,255,136,0.4)';
            } else if (inTune) {
                // Near center, in tune zone — dimmer green
                const a = brightness * 0.6;
                leds[i].style.background = 'rgba(0,255,136,' + a + ')';
                leds[i].style.boxShadow = '0 0 6px rgba(0,255,136,' + (a * 0.5) + ')';
            } else if (cents < 0) {
                // Flat — blue
                const a = brightness;
                leds[i].style.background = 'rgba(97,175,239,' + a + ')';
                leds[i].style.boxShadow = '0 0 8px rgba(97,175,239,' + (a * 0.6) + ')';
            } else {
                // Sharp — orange
                const a = brightness;
                leds[i].style.background = 'rgba(255,123,84,' + a + ')';
                leds[i].style.boxShadow = '0 0 8px rgba(255,123,84,' + (a * 0.6) + ')';
            }
        } else if (i === CENTER_LED && !inTune) {
            // Center marker always dimly visible when not in tune
            leds[i].style.background = '#1a3a2a';
            leds[i].style.boxShadow = 'none';
        } else {
            // LED off
            leds[i].style.background = 'var(--led-off)';
            leds[i].style.boxShadow = 'none';
        }
    }
}

// ── UI update ──
function updateUI(freq) {
    if (freq < 0) {
        noteNameEl.textContent = '--';
        noteNameEl.className = 'note-name';
        noteOctaveEl.textContent = '';
        noteFreqEl.textContent = '';
        centsBadgeEl.textContent = '--';
        centsBadgeEl.className = 'cents-badge';
        updateLEDs(null);
        clearStringHighlights();
        clearChromaticHighlights();
        return;
    }

    const { name, octave, cents, midi } = freqToNoteInfo(freq);
    const absCents = Math.abs(cents);
    const inTune = absCents <= 5;

    // Note name
    noteNameEl.textContent = name;
    noteNameEl.className = 'note-name active' + (inTune ? ' in-tune' : '');
    noteOctaveEl.textContent = octave;
    noteFreqEl.textContent = freq.toFixed(1) + ' Hz';

    // Cents badge
    if (inTune) {
        centsBadgeEl.textContent = 'IN TUNE';
        centsBadgeEl.className = 'cents-badge in-tune';
    } else if (cents < 0) {
        centsBadgeEl.textContent = cents + 'c';
        centsBadgeEl.className = 'cents-badge flat';
    } else {
        centsBadgeEl.textContent = '+' + cents + 'c';
        centsBadgeEl.className = 'cents-badge sharp';
    }

    // LEDs
    updateLEDs(cents);

    // Chromatic strip
    highlightChromatic(name, inTune);

    // Guitar strings
    highlightStrings(midi, absCents);
}

function clearChromaticHighlights() {
    chromaticNotes.forEach(function(n) { n.className = 'chromatic-note'; });
}

function highlightChromatic(noteName, inTune) {
    chromaticNotes.forEach(function(n) {
        if (n.dataset.note === noteName) {
            n.className = 'chromatic-note active' + (inTune ? ' in-tune' : '');
        } else {
            n.className = 'chromatic-note';
        }
    });
}

function clearStringHighlights() {
    stringBtns.forEach(function(b) { b.className = 'string-btn'; });
}

function highlightStrings(midi, absCents) {
    stringBtns.forEach(function(b) {
        var target = GUITAR_NOTES.find(function(n) { return n.name === b.dataset.note; });
        if (!target) return;
        var diff = Math.abs(midi - target.midi);
        if (diff === 0 && absCents <= 5) b.className = 'string-btn highlight';
        else if (diff === 0) b.className = 'string-btn close';
        else b.className = 'string-btn';
    });
}

// ── Audio loop ──
let silenceCount = 0;
const SILENCE_THRESHOLD = 10;

function loop() {
    if (!isRunning) return;
    animFrameId = requestAnimationFrame(loop);

    var buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);

    var rawFreq = detectPitch(buf, audioContext.sampleRate);

    if (rawFreq < 0) {
        silenceCount++;
        if (silenceCount > SILENCE_THRESHOLD) {
            smoothedFreq = -1;
            updateUI(-1);
        }
    } else {
        silenceCount = 0;
        var freq = smoothFreq(rawFreq);
        updateUI(freq);
    }
}

// ── Start / Stop ──
async function toggleTuner() {
    if (isRunning) { stopTuner(); }
    else { await startTuner(); }
}

async function startTuner() {
    hideError();
    startBtn.disabled = true;
    setStatus('Requesting microphone...', false);

    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false, latency: 0 },
            video: false,
        });
    } catch (err) {
        startBtn.disabled = false;
        handleMicError(err);
        return;
    }

    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioContext.state === 'suspended') {
        await audioContext.resume();
    }

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0;

    var source = audioContext.createMediaStreamSource(mediaStream);
    source.connect(analyser);

    isRunning = true;
    silenceCount = 0;
    smoothedFreq = -1;

    startBtn.textContent = 'Stop';
    startBtn.classList.add('stop');
    startBtn.disabled = false;
    setStatus('Listening...', true);

    loop();
}

function stopTuner() {
    isRunning = false;
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(function(t) { t.stop(); }); mediaStream = null; }
    if (analyser) { analyser.disconnect(); analyser = null; }

    updateUI(-1);
    startBtn.textContent = 'Start';
    startBtn.classList.remove('stop');
    setStatus('Click Start to enable microphone', false);
}

// ── Error handling ──
function handleMicError(err) {
    var msg = 'Could not access microphone.';
    if (err.name === 'NotAllowedError') msg = 'Microphone permission denied. Allow access in browser settings.';
    else if (err.name === 'NotFoundError') msg = 'No microphone found. Connect one and try again.';
    else if (err.name === 'NotReadableError') msg = 'Microphone in use by another app.';
    showError(msg);
    setStatus('Microphone error', false, true);
}

function showError(msg) { errorMsgEl.textContent = msg; errorMsgEl.classList.add('visible'); }
function hideError() { errorMsgEl.classList.remove('visible'); errorMsgEl.textContent = ''; }
function setStatus(text, active, error) {
    statusTextEl.textContent = text;
    statusDotEl.className = 'status-dot' + (active ? ' active' : '') + (error ? ' error' : '');
}

document.addEventListener('visibilitychange', function() {
    if (document.hidden && isRunning) stopTuner();
});
</script>
