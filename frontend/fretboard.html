<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StemScriber ✦ Fretboard Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Space+Grotesk:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0d0d12;
            --bg-dark: #13131a;
            --bg-card: #1a1a24;
            --orange: #ff7b54;
            --pink: #ff6b9d;
            --green: #00ff88;
            --text: #e8e4df;
            --text-dim: #7a7a85;
            --border: #2a2a35;
        }

        body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-dark) 50%, var(--bg-deep) 100%);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating orb background animation */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 123, 84, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 107, 157, 0.08) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -30px) scale(1.05);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }
            75% {
                transform: translate(10px, 30px) scale(1.02);
            }
        }

        /* Navigation */
        .nav-bar {
            position: relative;
            z-index: 10;
            background: rgba(19, 19, 26, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .nav-brand {
            font-family: 'Righteous', cursive;
            font-size: 1.5rem;
            color: var(--orange);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--orange);
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-family: 'Righteous', cursive;
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* Control panels */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .control-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .control-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            display: block;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        select {
            background: var(--bg-dark);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        select:hover, select:focus {
            border-color: var(--orange);
            outline: none;
        }

        option {
            background: var(--bg-dark);
            color: var(--text);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .btn {
            background: var(--bg-dark);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: var(--orange);
            color: var(--orange);
        }

        .btn.active {
            background: var(--orange);
            color: var(--bg-deep);
            border-color: var(--orange);
        }

        .btn-primary {
            background: var(--orange);
            color: var(--bg-deep);
            border-color: var(--orange);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #ff9370;
        }

        /* Slider styling */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--orange);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--orange);
            cursor: pointer;
            border: none;
        }

        .slider-value {
            min-width: 45px;
            text-align: right;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--orange);
        }

        /* Fretboard section */
        .fretboard-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .fretboard-container {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding: 1rem 0;
        }

        svg.fretboard {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        }

        .fret-label {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            fill: var(--text-dim);
        }

        .string-label {
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            fill: var(--text-dim);
            font-weight: 500;
        }

        .note-dot {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .note-dot:hover {
            filter: brightness(1.3);
        }

        .note-label {
            font-family: 'Outfit', sans-serif;
            font-size: 9px;
            font-weight: 600;
            pointer-events: none;
            user-select: none;
        }

        .capo-bar {
            pointer-events: none;
        }

        /* CAGED shapes display */
        .caged-info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 123, 84, 0.1);
            border: 1px solid rgba(255, 123, 84, 0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Controls section */
        .controls-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .control-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .toggle-switch {
            width: 40px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            position: relative;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--text);
            border-radius: 10px;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background: var(--green);
        }

        input[type="checkbox"]:checked + .toggle-switch::after {
            transform: translateX(16px);
        }

        input[type="checkbox"] {
            display: none;
        }

        @keyframes wbp { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                margin: 1rem auto;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .fretboard-section {
                padding: 1rem;
                overflow-x: auto;
            }

            .nav-bar {
                padding: 0.75rem 1rem;
            }

            .nav-brand {
                font-size: 1.1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .nav-links a {
                font-size: 0.8rem;
            }
        }
    </style>

</head>

    <!-- Navigation -->
    <nav class="nav-bar">

    <!-- Main container -->
    <div class="container">
        <div class="header">
            <h1>Fretboard Visualizer</h1>
            <p>Interactive guitar fretboard with scales, CAGED positions, and playable notes</p>
        </div>

        <!-- Control panels -->
        <div class="controls-grid">

                <label class="control-label">Key</label>
                <div class="select-group">
                    <select id="keySelect">
                        <option value="C">C</option>

                        <option value="G">G</option>
                        <option value="G#">G# / Ab</option>
                        <option value="A">A</option>
                        <option value="A#">A# / Bb</option>
                        <option value="B">B</option>
                    </select>
                </div>
            </div>

            <!-- Scale selector -->
            <div class="control-panel">
                <label class="control-label">Scale / Mode</label>
                <div class="select-group">
                    <select id="scaleSelect">
                        <optgroup label="Essential">
                            <option value="major">Major (Ionian)</option>
                            <option value="minor">Minor (Natural)</option>

                        <optgroup label="Modes">
                            <option value="dorian">Dorian</option>
                            <option value="phrygian">Phrygian</option>

                            <option value="locrian">Locrian</option>
                        </optgroup>
                        <optgroup label="Minor Variants">
                            <option value="harmonic-minor">Harmonic Minor</option>
                            <option value="melodic-minor">Melodic Minor</option>
                        </optgroup>
                        <optgroup label="Symmetric">
                            <option value="whole-tone">Whole Tone</option>
                            <option value="diminished">Diminished (HW)</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- Tuning selector -->
            <div class="control-panel">
                <label class="control-label">Tuning</label>
                <div class="select-group">
                    <select id="tuningSelect">
                        <option value="standard">Standard (EADGBE)</option>
                        <option value="drop-d">Drop D (DADGBE)</option>

            <div class="control-panel">
                <label class="control-label">Capo Position</label>
                <div class="select-group">
                    <select id="capoSelect">
                        <option value="0">No Capo</option>
                        <option value="1">Fret 1</option>
                        <option value="2">Fret 2</option>
                        <option value="3">Fret 3</option>
                        <option value="4">Fret 4</option>
                        <option value="5">Fret 5</option>
                        <option value="6">Fret 6</option>
                        <option value="7">Fret 7</option>
                        <option value="8">Fret 8</option>
                        <option value="9">Fret 9</option>

                        <option value="11">Fret 11</option>

            </div>

            <!-- CAGED shapes -->
            <div class="control-panel">
                <label class="control-label">CAGED Shape</label>
                <div class="button-group">
                    <button class="btn active" data-caged="all">All</button>
                    <button class="btn" data-caged="c">C</button>
                    <button class="btn" data-caged="a">A</button>

                    <button class="btn" data-caged="e">E</button>

            <!-- Display options -->
            <div class="control-panel">
                <label class="control-label">Display Options</label>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <label class="toggle-label">
                        <input type="checkbox" id="noteLabelsToggle" checked>
                        <span class="toggle-switch"></span>
                        <span>Note Labels</span>
                    </label>
                    <label class="toggle-label">
                        <input type="checkbox" id="intervalLabelsToggle">
                        <span class="toggle-switch"></span>

        <!-- Fretboard section -->
        <div class="fretboard-section">
            <div class="fretboard-container">
                <svg class="fretboard" id="fretboard" width="1000" height="300"></svg>
            </div>

                Select a CAGED shape to highlight its position on the fretboard.
            </div>

            <!-- Controls -->
            <div class="controls-section">
                <button class="btn btn-primary" id="playScaleBtn">▶ Play Scale</button>
                <button class="btn" id="stopPlayBtn" style="display: none;">⏹ Stop</button>
                
                <label class="toggle-label" style="margin: 0; justify-content: flex-start;">
                    <input type="checkbox" id="droneToggle">
                    <span class="toggle-switch"></span>
                    <span>Drone (Root)</span>

                <div style="display: flex; gap: 0.5rem; align-items: center;">

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        const SCALES = {
            'major':            [0, 2, 4, 5, 7, 9, 11],
            'minor':            [0, 2, 3, 5, 7, 8, 10],
            'minor-pentatonic': [0, 3, 5, 7, 10],
            'major-pentatonic': [0, 2, 4, 7, 9],
            'blues':            [0, 3, 5, 6, 7, 10],
            'dorian':           [0, 2, 3, 5, 7, 9, 10],
            'mixolydian':       [0, 2, 4, 5, 7, 9, 10],
            'phrygian':         [0, 1, 3, 5, 7, 8, 10],
            'lydian':           [0, 2, 4, 6, 7, 9, 11],
            'locrian':          [0, 1, 3, 5, 6, 8, 10],
            'harmonic-minor':   [0, 2, 3, 5, 7, 8, 11],
            'melodic-minor':    [0, 2, 3, 5, 7, 9, 11],
            'whole-tone':       [0, 2, 4, 6, 8, 10],
            'diminished':       [0, 2, 3, 5, 6, 8, 9, 11]
        };

        const INTERVALS = {
            0: 'R', 1: 'b2', 2: '2', 3: 'b3', 4: '3', 5: '4', 6: 'b5', 7: '5', 8: 'b6', 9: '6', 10: 'b7', 11: '7'
        };

        // MIDI note numbers for open strings (low to high)
        const TUNINGS = {
            standard:          { notes: ['E', 'A', 'D', 'G', 'B', 'E'], midi: [40, 45, 50, 55, 59, 64] },
            'drop-d':          { notes: ['D', 'A', 'D', 'G', 'B', 'E'], midi: [38, 45, 50, 55, 59, 64] },
            'open-g':          { notes: ['D', 'G', 'D', 'G', 'B', 'D'], midi: [38, 43, 50, 55, 59, 62] },
            'open-d':          { notes: ['D', 'A', 'D', 'F#', 'A', 'D'], midi: [38, 45, 50, 54, 57, 62] },
            dadgad:            { notes: ['D', 'A', 'D', 'G', 'A', 'D'], midi: [38, 45, 50, 55, 57, 62] },
            'half-step-down':  { notes: ['D#', 'G#', 'C#', 'F#', 'A#', 'D#'], midi: [39, 44, 49, 54, 58, 63] },
            'whole-step-down': { notes: ['D', 'G', 'C', 'F', 'A', 'D'], midi: [38, 43, 48, 53, 57, 62] },
            bass:              { notes: ['E', 'A', 'D', 'G'], midi: [28, 33, 38, 43] }
        };

        // CAGED chord shapes — major and minor families.
        // chordFrets = fret per string for the OPEN chord (low E → high E), -1 = muted.
        // nativeKey = semitone index of the key this open shape naturally plays.
        const CAGED_MAJOR = {
            c: { nativeKey: 0,  chordFrets: [-1, 3, 2, 0, 1, 0] },  // C:  x32010
            a: { nativeKey: 9,  chordFrets: [-1, 0, 2, 2, 2, 0] },  // A:  x02220
            g: { nativeKey: 7,  chordFrets: [3, 2, 0, 0, 0, 3] },   // G:  320003
            e: { nativeKey: 4,  chordFrets: [0, 2, 2, 1, 0, 0] },   // E:  022100
            d: { nativeKey: 2,  chordFrets: [-1, -1, 0, 2, 3, 2] }  // D:  xx0232
        };

        const CAGED_MINOR = {
            c: { nativeKey: 0,  chordFrets: [-1, 3, 1, 0, 1, -1] }, // Cm: x3101x
            a: { nativeKey: 9,  chordFrets: [-1, 0, 2, 2, 1, 0] },  // Am: x02210
            g: { nativeKey: 7,  chordFrets: [3, 1, 0, 0, 3, 3] },   // Gm: 310033
            e: { nativeKey: 4,  chordFrets: [0, 2, 2, 0, 0, 0] },   // Em: 022000
            d: { nativeKey: 2,  chordFrets: [-1, -1, 0, 2, 3, 1] }  // Dm: xx0231
        };

        // Dominant 7 chord shapes (for Mixolydian, Blues)
        const CAGED_DOM7 = {
            c: { nativeKey: 0,  chordFrets: [-1, 3, 2, 3, 1, 0] },  // C7:  x32310
            a: { nativeKey: 9,  chordFrets: [-1, 0, 2, 0, 2, 0] },  // A7:  x02020
            g: { nativeKey: 7,  chordFrets: [3, 2, 0, 0, 0, 1] },   // G7:  320001
            e: { nativeKey: 4,  chordFrets: [0, 2, 0, 1, 0, 0] },   // E7:  020100
            d: { nativeKey: 2,  chordFrets: [-1, -1, 0, 2, 1, 2] }  // D7:  xx0212
        };

        // Minor 7 chord shapes (for Dorian, natural minor)
        const CAGED_MIN7 = {
            c: { nativeKey: 0,  chordFrets: [-1, 3, 1, 3, 1, -1] }, // Cm7: x3131x
            a: { nativeKey: 9,  chordFrets: [-1, 0, 2, 0, 1, 0] },  // Am7: x02010
            g: { nativeKey: 7,  chordFrets: [3, 1, 0, 0, 3, 1] },   // Gm7: 310031
            e: { nativeKey: 4,  chordFrets: [0, 2, 0, 0, 0, 0] },   // Em7: 020000
            d: { nativeKey: 2,  chordFrets: [-1, -1, 0, 2, 1, 1] }  // Dm7: xx0211
        };

        // Major 7 chord shapes (for Lydian, Ionian)
        const CAGED_MAJ7 = {
            c: { nativeKey: 0,  chordFrets: [-1, 3, 2, 0, 0, 0] },  // Cmaj7: x32000
            a: { nativeKey: 9,  chordFrets: [-1, 0, 2, 1, 2, 0] },  // Amaj7: x02120
            g: { nativeKey: 7,  chordFrets: [3, 2, 0, 0, 0, 2] },   // Gmaj7: 320002
            e: { nativeKey: 4,  chordFrets: [0, 2, 1, 1, 0, 0] },   // Emaj7: 021100
            d: { nativeKey: 2,  chordFrets: [-1, -1, 0, 2, 2, 2] }  // Dmaj7: xx0222
        };

        // MinMaj7 chord shapes (for Harmonic Minor, Melodic Minor)
        const CAGED_MINMAJ7 = {
            c: { nativeKey: 0,  chordFrets: [-1, 3, 1, 0, 0, -1] }, // CmM7: x3100x
            a: { nativeKey: 9,  chordFrets: [-1, 0, 2, 1, 1, 0] },  // AmM7: x02110
            g: { nativeKey: 7,  chordFrets: [3, 1, 0, 0, 3, 2] },   // GmM7: 310032
            e: { nativeKey: 4,  chordFrets: [0, 2, 1, 0, 0, 0] },   // EmM7: 021000
            d: { nativeKey: 2,  chordFrets: [-1, -1, 0, 2, 2, 1] }  // DmM7: xx0221
        };

        // Which chord family to use for each scale
        const SCALE_CHORD_FAMILY = {
            'major':            'maj7',
            'major-pentatonic': 'major',
            'lydian':           'maj7',
            'mixolydian':       'dom7',
            'minor':            'min7',
            'minor-pentatonic': 'minor',
            'blues':            'dom7',
            'dorian':           'min7',
            'phrygian':         'minor',
            'locrian':          'minor',
            'harmonic-minor':   'minmaj7',
            'melodic-minor':    'minmaj7',
            'whole-tone':       'major',
            'diminished':       'minor'
        };

        const CHORD_SETS = {
            major:   CAGED_MAJOR,
            minor:   CAGED_MINOR,
            dom7:    CAGED_DOM7,
            min7:    CAGED_MIN7,
            maj7:    CAGED_MAJ7,
            minmaj7: CAGED_MINMAJ7
        };

        const FAMILY_LABELS = {
            major:   '',
            minor:   'm',
            dom7:    '7',
            min7:    'm7',
            maj7:    'maj7',
            minmaj7: 'mMaj7'
        };

        const COLORS = {
            root: '#ff7b54',
            scale: '#00ff88',
            other: '#404550'
        };

        // Fret dot markers (standard inlays)
        const FRET_DOTS = [3, 5, 7, 9, 15, 17, 19, 21];
        const DOUBLE_DOTS = [12];

        let state = {
            key: 'C',
            scale: 'major',
            tuning: 'standard',
            capo: 0,
            cagedShape: 'all',
            showNoteLabels: true,
            showIntervals: false,
            isPlaying: false,
            droneOscillator: null,
            metronomeRunning: false,
            bpm: 120
        };

        function getNoteIndex(noteName) {
            return NOTES.indexOf(noteName);
        }

        function midiToFrequency(midi) {
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        function getScaleNotes() {
            const keyIndex = getNoteIndex(state.key);
            return SCALES[state.scale].map(offset => (keyIndex + offset) % 12);
        }

        function getTuningNotes() {
            const t = TUNINGS[state.tuning];
            return t.notes.map(note => {
                return (getNoteIndex(note) + state.capo) % 12;
            });
        }

        function getTuningMidi() {
            const t = TUNINGS[state.tuning];
            return t.midi.map(m => m + state.capo);
        }

        function getColorForNote(noteIndex) {
            const keyIndex = getNoteIndex(state.key);
            if ((noteIndex - keyIndex + 12) % 12 === 0) return COLORS.root;
            if (getScaleNotes().includes(noteIndex)) return COLORS.scale;
            return COLORS.other;
        }

        // Get the transposed chord frets for a CAGED shape in the current key.
        // Returns { chordFrets, offset, minFret, maxFret, family }
        function getTransposedShape(shape) {
            const family = SCALE_CHORD_FAMILY[state.scale] || 'major';
            const shapeSet = CHORD_SETS[family] || CAGED_MAJOR;
            const s = shapeSet[shape];
            const keyIndex = getNoteIndex(state.key);
            const offset = (keyIndex - s.nativeKey + 12) % 12;
            const chordFrets = s.chordFrets.map(f => f === -1 ? -1 : f + offset);
            const active = chordFrets.filter(f => f >= 0);
            const minFret = Math.min(...active);
            const maxFret = Math.max(...active);
            return { chordFrets, offset, minFret, maxFret, family };
        }

        function playNote(midiNote, duration = 0.5) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.value = midiToFrequency(midiNote);
            osc.type = 'triangle';

            gain.gain.setValueAtTime(0.35, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function startDrone() {
            if (state.droneOscillator) stopDrone();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            // Drone at the root note, octave 3
            const keyIndex = getNoteIndex(state.key);
            const midiNote = 48 + keyIndex; // C3 = 48
            osc.frequency.value = midiToFrequency(midiNote);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);

            osc.start();
            state.droneOscillator = osc;
            state.droneGain = gain;
        }

        function stopDrone() {
            if (state.droneOscillator) {
                state.droneOscillator.stop();
                state.droneOscillator = null;
                state.droneGain = null;
            }
        }

        function playScale() {
            if (state.isPlaying) return;
            state.isPlaying = true;
            document.getElementById('playScaleBtn').style.display = 'none';
            document.getElementById('stopPlayBtn').style.display = 'block';

            const scaleNotes = getScaleNotes();
            const tuningMidi = getTuningMidi();
            const midiSet = new Set();

            // Collect all scale notes on the fretboard as MIDI values
            for (let s = 0; s < tuningMidi.length; s++) {
                for (let fret = state.capo; fret <= 22; fret++) {
                    const midi = tuningMidi[s] + fret;
                    const noteIndex = midi % 12;
                    if (scaleNotes.includes(noteIndex)) midiSet.add(midi);
                }
            }

            const sorted = [...midiSet].sort((a, b) => a - b);
            // Play one octave ascending from the lowest root
            const keyIndex = getNoteIndex(state.key);
            const oneOctave = sorted.filter(m => m % 12 === keyIndex);
            const startMidi = oneOctave[0] || sorted[0];
            const endMidi = startMidi + 12;
            const toPlay = sorted.filter(m => m >= startMidi && m <= endMidi);

            let index = 0;
            function playNext() {
                if (index >= toPlay.length || !state.isPlaying) {
                    state.isPlaying = false;
                    document.getElementById('playScaleBtn').style.display = 'block';
                    document.getElementById('stopPlayBtn').style.display = 'none';
                    return;
                }
                playNote(toPlay[index], 0.4);
                index++;
                setTimeout(playNext, 400);
            }
            playNext();
        }

        function metronomeClick() {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = 800;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0, audioContext.currentTime + 0.05);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.05);
        }

        function startMetronome() {
            if (state.metronomeRunning) return;
            state.metronomeRunning = true;
            document.getElementById('metronomeBtn').textContent = '⏹ Stop';
            function tick() {
                if (!state.metronomeRunning) {
                    document.getElementById('metronomeBtn').textContent = '♩ Start';
                    return;
                }
                metronomeClick();
                setTimeout(tick, (60 / state.bpm) * 1000);
            }
            tick();
        }

        function stopMetronome() {
            state.metronomeRunning = false;
            document.getElementById('metronomeBtn').textContent = '♩ Start';
        }

        function drawFretboard() {
            const svg = document.getElementById('fretboard');
            svg.innerHTML = '';

            const tuning = TUNINGS[state.tuning];
            const stringCount = tuning.notes.length;
            const fretCount = 22;
            const stringSpacing = 30;
            const startX = 50;
            const startY = 40;
            const nutWidth = 4;
            const totalFretboardHeight = stringSpacing * (stringCount - 1);

            // Uniform fret spacing
            const fretSpacing = 48;
            const totalWidth = startX + nutWidth + fretSpacing * fretCount + 20;
            svg.setAttribute('width', totalWidth);
            svg.setAttribute('height', startY + totalFretboardHeight + 50);

            function fretX(fret) {
                if (fret === 0) return startX;
                return startX + nutWidth + fretSpacing * fret;
            }

            // Fretboard background
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('x', startX);
            bg.setAttribute('y', startY - 8);
            bg.setAttribute('width', fretX(fretCount) - startX + fretSpacing * 0.5);
            bg.setAttribute('height', totalFretboardHeight + 16);
            bg.setAttribute('fill', '#1e1e28');
            bg.setAttribute('rx', 4);
            svg.appendChild(bg);

            // Fret dot inlays
            FRET_DOTS.forEach(f => {
                if (f > fretCount) return;
                const cx = fretX(f) - fretSpacing / 2;
                const cy = startY + totalFretboardHeight / 2;
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.setAttribute('cx', cx);
                dot.setAttribute('cy', cy);
                dot.setAttribute('r', 4);
                dot.setAttribute('fill', '#2a2a38');
                svg.appendChild(dot);
            });
            DOUBLE_DOTS.forEach(f => {
                if (f > fretCount) return;
                const cx = fretX(f) - fretSpacing / 2;
                [-1, 1].forEach(dir => {
                    const cy = startY + totalFretboardHeight / 2 + dir * (totalFretboardHeight * 0.3);
                    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    dot.setAttribute('cx', cx);
                    dot.setAttribute('cy', cy);
                    dot.setAttribute('r', 4);
                    dot.setAttribute('fill', '#2a2a38');
                    svg.appendChild(dot);
                });
            });

            // Nut
            const nut = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            nut.setAttribute('x', startX);
            nut.setAttribute('y', startY - 5);
            nut.setAttribute('width', nutWidth);
            nut.setAttribute('height', totalFretboardHeight + 10);
            nut.setAttribute('fill', '#d4cfc8');
            nut.setAttribute('rx', 1);
            svg.appendChild(nut);

            // Fret wires
            for (let fret = 1; fret <= fretCount; fret++) {
                const x = fretX(fret);
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x);
                line.setAttribute('y1', startY - 5);
                line.setAttribute('x2', x);
                line.setAttribute('y2', startY + totalFretboardHeight + 5);
                line.setAttribute('stroke', '#4a4a55');
                line.setAttribute('stroke-width', 1.5);
                svg.appendChild(line);

                // Fret number
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x - fretSpacing / 2);
                text.setAttribute('y', startY - 15);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('class', 'fret-label');
                text.textContent = fret;
                svg.appendChild(text);
            }

            // Capo bar
            if (state.capo > 0) {
                const cx = fretX(state.capo) - fretSpacing / 2;
                const capoBar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                capoBar.setAttribute('x', cx - 6);
                capoBar.setAttribute('y', startY - 10);
                capoBar.setAttribute('width', 12);
                capoBar.setAttribute('height', totalFretboardHeight + 20);
                capoBar.setAttribute('fill', 'rgba(255, 107, 157, 0.25)');
                capoBar.setAttribute('stroke', '#ff6b9d');
                capoBar.setAttribute('stroke-width', 2);
                capoBar.setAttribute('rx', 4);
                capoBar.setAttribute('class', 'capo-bar');
                svg.appendChild(capoBar);
            }

            // Strings
            const tuningNotes = getTuningNotes();
            const tuningMidi = getTuningMidi();
            for (let s = 0; s < stringCount; s++) {
                const y = startY + stringSpacing * (stringCount - 1 - s);
                // String thickness varies: thicker for bass strings
                const thickness = 1 + (stringCount - 1 - s) * 0.3;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', startX);
                line.setAttribute('y1', y);
                line.setAttribute('x2', fretX(fretCount) + fretSpacing * 0.3);
                line.setAttribute('y2', y);
                line.setAttribute('stroke', '#8a8a95');
                line.setAttribute('stroke-width', thickness);
                svg.appendChild(line);

                // String label
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', startX - 12);
                label.setAttribute('y', y + 4);
                label.setAttribute('text-anchor', 'end');
                label.setAttribute('class', 'string-label');
                label.textContent = tuning.notes[s];
                svg.appendChild(label);
            }

            // Build chord tone lookup if a CAGED shape is selected
            const scaleNotes = getScaleNotes();
            const keyIndex = getNoteIndex(state.key);
            let transposed = null;
            let chordToneMap = null; // string → fret for the chord tones
            let scaleRangeMin = 0, scaleRangeMax = 22;

            if (state.cagedShape !== 'all') {
                transposed = getTransposedShape(state.cagedShape);
                chordToneMap = new Map();
                for (let s = 0; s < Math.min(stringCount, transposed.chordFrets.length); s++) {
                    const f = transposed.chordFrets[s];
                    if (f >= 0) chordToneMap.set(s + ':' + f, true);
                }
                // Show scale tones in the area around the chord shape (± 2 frets)
                scaleRangeMin = Math.max(0, transposed.minFret - 1);
                scaleRangeMax = transposed.maxFret + 2;
            }

            // Draw scale tones first (behind chord tones)
            for (let s = 0; s < stringCount; s++) {
                const y = startY + stringSpacing * (stringCount - 1 - s);
                const openMidi = tuningMidi[s];

                for (let fret = 0; fret <= fretCount; fret++) {
                    const midi = openMidi + fret;
                    const noteIndex = midi % 12;
                    if (!scaleNotes.includes(noteIndex)) continue;

                    // When CAGED shape is active, skip chord tones here (drawn later)
                    // and only show scale tones within the shape's fret range
                    if (chordToneMap) {
                        if (chordToneMap.has(s + ':' + fret)) continue; // drawn as chord tone
                        if (fret < scaleRangeMin || fret > scaleRangeMax) continue;
                        // Don't show scale tones on muted strings for this shape
                        if (transposed.chordFrets[s] === -1) continue;
                    }

                    let cx;
                    if (fret === 0) {
                        cx = startX - 6;
                    } else {
                        cx = fretX(fret) - fretSpacing / 2;
                    }

                    const isRoot = (noteIndex - keyIndex + 12) % 12 === 0;
                    const color = isRoot ? COLORS.root : COLORS.scale;
                    // Scale tones are smaller/dimmer when a CAGED shape is selected
                    const r = chordToneMap ? 8 : (isRoot ? 13 : 11);
                    const opacity = chordToneMap ? 0.4 : 1;

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', cx);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', r);
                    circle.setAttribute('fill', color);
                    circle.setAttribute('opacity', opacity);
                    circle.setAttribute('class', 'note-dot');
                    circle.style.cursor = 'pointer';

                    circle.addEventListener('click', () => {
                        playNote(midi, 0.6);
                        circle.style.filter = 'brightness(1.5)';
                        setTimeout(() => { circle.style.filter = ''; }, 200);
                    });
                    svg.appendChild(circle);

                    if (state.showNoteLabels || state.showIntervals) {
                        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        label.setAttribute('x', cx);
                        label.setAttribute('y', y + 4);
                        label.setAttribute('text-anchor', 'middle');
                        label.setAttribute('class', 'note-label');
                        label.setAttribute('fill', '#000');
                        label.setAttribute('opacity', opacity);
                        if (state.showIntervals) {
                            label.textContent = INTERVALS[(noteIndex - keyIndex + 12) % 12] || '';
                        } else {
                            label.textContent = NOTES[noteIndex];
                        }
                        svg.appendChild(label);
                    }
                }
            }

            // Draw chord tones on top (big, bright, with white outline)
            if (chordToneMap) {
                for (let s = 0; s < Math.min(stringCount, transposed.chordFrets.length); s++) {
                    const fret = transposed.chordFrets[s];
                    if (fret < 0) continue; // muted string
                    if (fret > fretCount) continue;

                    const y = startY + stringSpacing * (stringCount - 1 - s);
                    const midi = tuningMidi[s] + fret;
                    const noteIndex = midi % 12;
                    const isRoot = (noteIndex - keyIndex + 12) % 12 === 0;

                    let cx;
                    if (fret === 0) {
                        cx = startX - 6;
                    } else {
                        cx = fretX(fret) - fretSpacing / 2;
                    }

                    // White outline ring to make chord tones pop
                    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    ring.setAttribute('cx', cx);
                    ring.setAttribute('cy', y);
                    ring.setAttribute('r', 15);
                    ring.setAttribute('fill', 'none');
                    ring.setAttribute('stroke', isRoot ? '#ff7b54' : '#ffffff');
                    ring.setAttribute('stroke-width', 2.5);
                    ring.setAttribute('opacity', 0.8);
                    svg.appendChild(ring);

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', cx);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', 13);
                    circle.setAttribute('fill', isRoot ? COLORS.root : '#ffffff');
                    circle.setAttribute('class', 'note-dot');
                    circle.style.cursor = 'pointer';

                    circle.addEventListener('click', () => {
                        playNote(midi, 0.6);
                        circle.style.filter = 'brightness(1.5)';
                        setTimeout(() => { circle.style.filter = ''; }, 200);
                    });
                    svg.appendChild(circle);

                    if (state.showNoteLabels || state.showIntervals) {
                        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        label.setAttribute('x', cx);
                        label.setAttribute('y', y + 4);
                        label.setAttribute('text-anchor', 'middle');
                        label.setAttribute('class', 'note-label');
                        label.setAttribute('fill', isRoot ? '#fff' : '#000');
                        label.setAttribute('font-weight', '700');
                        if (state.showIntervals) {
                            label.textContent = INTERVALS[(noteIndex - keyIndex + 12) % 12] || '';
                        } else {
                            label.textContent = NOTES[noteIndex];
                        }
                        svg.appendChild(label);
                    }
                }

                // Draw X marks for muted strings
                for (let s = 0; s < Math.min(stringCount, transposed.chordFrets.length); s++) {
                    if (transposed.chordFrets[s] !== -1) continue;
                    const y = startY + stringSpacing * (stringCount - 1 - s);
                    const x = startX - 6;
                    const xmark = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    xmark.setAttribute('x', x);
                    xmark.setAttribute('y', y + 5);
                    xmark.setAttribute('text-anchor', 'middle');
                    xmark.setAttribute('fill', '#ff4757');
                    xmark.setAttribute('font-size', '14');
                    xmark.setAttribute('font-weight', '700');
                    xmark.setAttribute('font-family', 'Outfit, sans-serif');
                    xmark.textContent = 'X';
                    svg.appendChild(xmark);
                }
            }

            updateCAGEDInfo();
        }

        function updateCAGEDInfo() {
            const info = document.getElementById('cagedInfo');
            const scaleName = document.getElementById('scaleSelect').selectedOptions[0].text;
            if (state.cagedShape === 'all') {
                info.textContent = `Showing all ${state.key} ${scaleName} positions. Click any note to hear it.`;
            } else {
                const t = getTransposedShape(state.cagedShape);
                const shapeLetter = state.cagedShape.toUpperCase();
                const familyLabel = FAMILY_LABELS[t.family] || '';
                const openChordName = shapeLetter + familyLabel;
                const targetChordName = state.key + familyLabel;
                const fretStr = t.minFret === 0 ? 'open position' : `fret ${t.minFret}`;
                info.innerHTML = `<strong>${openChordName}-shape ${targetChordName} chord</strong> — the open ${openChordName} form moved to ${fretStr}. ` +
                    `Scale: ${state.key} ${scaleName}. White dots = chord tones, dimmed = scale tones. Click to hear.`;
            }
        }

        // ── Event listeners ──
        document.getElementById('keySelect').addEventListener('change', (e) => {
            state.key = e.target.value;
            if (state.droneOscillator) { stopDrone(); startDrone(); }
            drawFretboard();
        });

        document.getElementById('scaleSelect').addEventListener('change', (e) => {
            state.scale = e.target.value;
            drawFretboard();
        });

        document.getElementById('tuningSelect').addEventListener('change', (e) => {
            state.tuning = e.target.value;
            drawFretboard();
        });

        document.getElementById('capoSelect').addEventListener('change', (e) => {
            state.capo = parseInt(e.target.value);
            drawFretboard();
        });

        document.querySelectorAll('[data-caged]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-caged]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.cagedShape = e.target.dataset.caged;
                drawFretboard();
            });
        });

        document.getElementById('noteLabelsToggle').addEventListener('change', (e) => {
            state.showNoteLabels = e.target.checked;
            drawFretboard();
        });

        document.getElementById('intervalLabelsToggle').addEventListener('change', (e) => {
            state.showIntervals = e.target.checked;
            drawFretboard();
        });

        document.getElementById('playScaleBtn').addEventListener('click', playScale);

        document.getElementById('stopPlayBtn').addEventListener('click', () => {
            state.isPlaying = false;
            document.getElementById('playScaleBtn').style.display = 'block';
            document.getElementById('stopPlayBtn').style.display = 'none';
        });

        document.getElementById('droneToggle').addEventListener('change', (e) => {
            if (e.target.checked) startDrone();
            else stopDrone();
        });

        document.getElementById('bpmSlider').addEventListener('input', (e) => {
            state.bpm = parseInt(e.target.value);
            document.getElementById('bpmValue').textContent = state.bpm;
        });

        document.getElementById('metronomeBtn').addEventListener('click', () => {
            if (state.metronomeRunning) stopMetronome();
            else startMetronome();
        });

        drawFretboard();

        document.addEventListener('click', () => {
            if (audioContext.state === 'suspended') audioContext.resume();
        }, { once: true });
    </script>
</body>
</html>
